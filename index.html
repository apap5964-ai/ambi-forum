<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBI FORUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: #fff; padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #6a4eff, #a855f7, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .auth-btn { background: rgba(20,20,35,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(106,78,255,0.3); padding: 10px 25px; border-radius: 60px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .auth-btn:hover { border-color: #6a4eff; box-shadow: 0 0 20px rgba(106,78,255,0.4); transform: translateY(-3px); }
        .new-topic-btn { background: linear-gradient(135deg, #6a4eff, #a855f7); padding: 12px 25px; border: none; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(106,78,255,0.4); }
        .new-topic-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(106,78,255,0.7); }
        .topics-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .topic-card { background: rgba(20,20,40,0.7); backdrop-filter: blur(5px); border-radius: 20px; padding: 20px; border: 1px solid rgba(106,78,255,0.3); cursor: pointer; transition: all 0.3s; }
        .topic-card:hover { border-color: #6a4eff; transform: translateY(-5px); box-shadow: 0 10px 25px rgba(106,78,255,0.2); }
        .topic-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: #a855f7; }
        .topic-meta { display: flex; gap: 20px; font-size: 0.85rem; opacity: 0.7; margin-bottom: 10px; }
        .topic-content { opacity: 0.9; margin-bottom: 10px; }
        .topic-author { display: flex; align-items: center; gap: 10px; }
        .topic-author img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #6a4eff; }

        /* Модальные окна */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-card { background: rgba(20,20,40,0.9); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(106,78,255,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 1.8rem; font-weight: 700; color: #a855f7; }
        .close-btn { font-size: 28px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .close-btn:hover { opacity: 1; color: #6a4eff; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
        .input-group input, .input-group textarea { width: 100%; padding: 14px 18px; background: rgba(10,10,20,0.6); border: 1px solid rgba(106,78,255,0.3); border-radius: 20px; color: white; font-size: 1rem; outline: none; transition: 0.2s; }
        .input-group input:focus, .input-group textarea:focus { border-color: #6a4eff; box-shadow: 0 0 15px rgba(106,78,255,0.2); }
        .submit-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #6a4eff, #a855f7); border: none; border-radius: 40px; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(106,78,255,0.4); }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(106,78,255,0.7); }

        .comments-section { margin-top: 25px; }
        .comment { background: rgba(30,30,50,0.5); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .comment-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .comment-header img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid #6a4eff; }
        .comment-author { font-weight: 600; color: #a855f7; }
        .comment-time { font-size: 0.75rem; opacity: 0.6; }
        .comment-text { margin-left: 34px; }

        .file-upload-area { border: 2px dashed rgba(106,78,255,0.3); border-radius: 20px; padding: 15px; text-align: center; margin: 15px 0; cursor: pointer; transition: 0.2s; }
        .file-upload-area:hover { border-color: #6a4eff; background: rgba(106,78,255,0.1); }
        .uploaded-image { max-width: 100%; max-height: 300px; border-radius: 15px; margin-top: 10px; border: 1px solid rgba(106,78,255,0.3); }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #6a4eff, #a855f7); color: white; padding: 10px 20px; border-radius: 50px; z-index: 9999; font-weight: bold; box-shadow: 0 0 20px rgba(106,78,255,0.5); animation: toastFade 2s ease-out forwards; }
        @keyframes toastFade { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 20% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">💬 AMBI FORUM</div>
        <div style="display: flex; gap: 15px;">
            <button class="auth-btn" id="authBtn">🔐 ВОЙТИ</button>
            <button class="new-topic-btn" id="newTopicBtn" style="display: none;">➕ Новая тема</button>
        </div>
    </div>

    <div id="topicsContainer" class="topics-list">
        <div style="text-align: center; opacity: 0.6; padding: 50px;">Загрузка тем...</div>
    </div>
</div>

<!-- Модальное окно входа/регистрации -->
<div class="modal" id="authModal">
    <div class="modal-card" style="max-width: 400px;">
        <div class="modal-header">
            <h3 id="authModalTitle">Вход</h3>
            <span class="close-btn" id="closeAuthModal">&times;</span>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 25px;">
            <button class="auth-btn" id="loginTabBtn" style="flex: 1; background: linear-gradient(135deg, #6a4eff, #a855f7);">LOGIN</button>
            <button class="auth-btn" id="registerTabBtn" style="flex: 1;">REGISTER</button>
        </div>
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Пароль" required>
            </div>
            <button type="submit" class="submit-btn">Войти</button>
            <p style="text-align: center; margin-top: 15px; opacity: 0.7;"><a href="#" id="forgotLink" style="color: #a855f7;">Забыли пароль?</a></p>
        </form>
        <form id="registerForm" style="display: none;">
            <div class="input-group">
                <input type="text" id="regUsername" placeholder="Имя пользователя" required>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Пароль" required>
            </div>
            <div class="input-group">
                <input type="password" id="regConfirm" placeholder="Подтверждение" required>
            </div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>

<!-- Модальное окно создания темы -->
<div class="modal" id="newTopicModal">
    <div class="modal-card">
        <div class="modal-header">
            <h3>📝 Новая тема</h3>
            <span class="close-btn" id="closeNewTopicModal">&times;</span>
        </div>
        <div class="input-group">
            <input type="text" id="topicTitle" placeholder="Заголовок темы">
        </div>
        <div class="input-group">
            <textarea id="topicContent" placeholder="Текст сообщения" style="height: 150px; resize: vertical;"></textarea>
        </div>
        <div class="file-upload-area" id="topicFileUpload">
            <span>📎 Прикрепить изображение (опционально)</span>
            <input type="file" id="topicFileInput" accept="image/*" style="display: none;">
        </div>
        <img id="topicImagePreview" class="uploaded-image" style="display: none;">
        <button class="submit-btn" id="createTopicBtn">Опубликовать</button>
    </div>
</div>

<!-- Модальное окно просмотра темы -->
<div class="modal" id="viewTopicModal">
    <div class="modal-card" style="max-width: 700px;">
        <div class="modal-header">
            <h3 id="viewTopicTitle"></h3>
            <span class="close-btn" id="closeViewTopicModal">&times;</span>
        </div>
        <div id="viewTopicContent" style="margin-bottom: 20px;"></div>
        <div class="comments-section" id="commentsSection"></div>
        <div class="input-group" style="margin-top: 20px;">
            <textarea id="commentInput" placeholder="Ваш комментарий..." style="height: 80px; resize: vertical;"></textarea>
        </div>
        <button class="submit-btn" id="addCommentBtn" style="margin-bottom: 10px;">Отправить</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyDCaTAB8wBL-VyFXwo5UlBUwwb51LRb2a4",
        authDomain: "ambi-loader-site.firebaseapp.com",
        projectId: "ambi-loader-site",
        storageBucket: "ambi-loader-site.firebasestorage.app",
        messagingSenderId: "751272275051",
        appId: "1:751272275051:web:6f9976c1bc05f606a0d52e"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Cloudinary config
    const CLOUD_NAME = "doptuvy8l";
    const UPLOAD_PRESET = "forum_preset";

    let currentUser = null;
    let currentPostId = null;

    // Auth UI
    const authBtn = document.getElementById('authBtn');
    const newTopicBtn = document.getElementById('newTopicBtn');
    const authModal = document.getElementById('authModal');
    const closeAuthModal = document.getElementById('closeAuthModal');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTabBtn = document.getElementById('loginTabBtn');
    const registerTabBtn = document.getElementById('registerTabBtn');

    auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
            authBtn.textContent = `👤 ${user.displayName || user.email.split('@')[0]}`;
            newTopicBtn.style.display = 'block';
        } else {
            authBtn.textContent = '🔐 ВОЙТИ';
            newTopicBtn.style.display = 'none';
        }
        loadTopics();
    });

    authBtn.onclick = () => authModal.classList.add('active');
    closeAuthModal.onclick = () => authModal.classList.remove('active');
    loginTabBtn.onclick = () => { loginForm.style.display = 'block'; registerForm.style.display = 'none'; };
    registerTabBtn.onclick = () => { loginForm.style.display = 'none'; registerForm.style.display = 'block'; };

    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
            authModal.classList.remove('active');
        } catch (err) { alert('Ошибка: ' + err.message); }
    };

    registerForm.onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (password !== confirm) { alert('Пароли не совпадают'); return; }
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            await cred.user.updateProfile({ displayName: username });
            await db.collection('users').doc(cred.user.uid).set({
                displayName: username,
                email: email,
                avatarBase64: ""
            }, { merge: true });
            authModal.classList.remove('active');
        } catch (err) { alert('Ошибка: ' + err.message); }
    };

    // Форум
    async function loadTopics() {
        const container = document.getElementById('topicsContainer');
        container.innerHTML = '<div style="text-align: center; opacity: 0.6; padding: 50px;">Загрузка тем...</div>';
        try {
            const snapshot = await db.collection('forum_posts').orderBy('createdAt', 'desc').get();
            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align: center; opacity: 0.6; padding: 50px;">Нет тем. Создайте первую!</div>';
                return;
            }
            let html = '';
            for (const doc of snapshot.docs) {
                const post = doc.data();
                const author = await getUser(post.authorId);
                const avatar = author?.avatarBase64 || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.authorName)}&background=6a4eff&color=fff`;
                html += `
                    <div class="topic-card" onclick="openTopic('${doc.id}')">
                        <div class="topic-title">${escapeHtml(post.title)}</div>
                        <div class="topic-meta">
                            <span>📅 ${post.createdAt?.toDate().toLocaleString() || 'недавно'}</span>
                            <span>💬 ${post.commentCount || 0} ответов</span>
                        </div>
                        <div class="topic-content">${escapeHtml(post.content.substring(0, 150))}${post.content.length > 150 ? '...' : ''}</div>
                        <div class="topic-author">
                            <img src="${avatar}"> <span>${escapeHtml(post.authorName)}</span>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch (err) { console.error(err); container.innerHTML = '<div style="color: red;">Ошибка загрузки</div>'; }
    }

    async function getUser(uid) {
        if (!uid) return null;
        const doc = await db.collection('users').doc(uid).get();
        return doc.exists ? doc.data() : null;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Новая тема
    const newTopicModal = document.getElementById('newTopicModal');
    document.getElementById('newTopicBtn').onclick = () => newTopicModal.classList.add('active');
    document.getElementById('closeNewTopicModal').onclick = () => newTopicModal.classList.remove('active');

    let topicImageUrl = '';
    document.getElementById('topicFileUpload').onclick = () => document.getElementById('topicFileInput').click();
    document.getElementById('topicFileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);
        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            topicImageUrl = data.secure_url;
            document.getElementById('topicImagePreview').src = topicImageUrl;
            document.getElementById('topicImagePreview').style.display = 'block';
        } catch (err) { alert('Ошибка загрузки картинки'); }
    };

    document.getElementById('createTopicBtn').onclick = async () => {
        if (!currentUser) { alert('Войдите!'); return; }
        const title = document.getElementById('topicTitle').value.trim();
        const content = document.getElementById('topicContent').value.trim();
        if (!title || !content) { alert('Заполните поля'); return; }
        try {
            const post = {
                title, content,
                imageUrl: topicImageUrl || null,
                authorId: currentUser.uid,
                authorName: currentUser.displayName || currentUser.email.split('@')[0],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                commentCount: 0
            };
            await db.collection('forum_posts').add(post);
            newTopicModal.classList.remove('active');
            document.getElementById('topicTitle').value = '';
            document.getElementById('topicContent').value = '';
            topicImageUrl = '';
            document.getElementById('topicImagePreview').style.display = 'none';
            loadTopics();
            showToast('Тема создана!');
        } catch (err) { alert('Ошибка: ' + err.message); }
    };

    // Просмотр темы
    const viewTopicModal = document.getElementById('viewTopicModal');
    window.openTopic = async (postId) => {
        currentPostId = postId;
        try {
            const postDoc = await db.collection('forum_posts').doc(postId).get();
            const post = postDoc.data();
            const author = await getUser(post.authorId);
            const avatar = author?.avatarBase64 || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.authorName)}&background=6a4eff&color=fff`;
            document.getElementById('viewTopicTitle').textContent = post.title;
            let contentHtml = `
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
                    <img src="${avatar}" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #6a4eff;">
                    <div><strong>${escapeHtml(post.authorName)}</strong> · ${post.createdAt?.toDate().toLocaleString() || 'недавно'}</div>
                </div>
                <div style="margin-bottom: 15px;">${escapeHtml(post.content)}</div>
            `;
            if (post.imageUrl) contentHtml += `<img src="${post.imageUrl}" class="uploaded-image">`;
            document.getElementById('viewTopicContent').innerHTML = contentHtml;

            // Комментарии
            const commentsSnap = await db.collection('forum_posts').doc(postId).collection('comments').orderBy('createdAt', 'asc').get();
            let commentsHtml = '';
            commentsSnap.forEach(commentDoc => {
                const c = commentDoc.data();
                commentsHtml += `
                    <div class="comment">
                        <div class="comment-header">
                            <img src="${c.authorAvatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(c.authorName)}">
                            <span class="comment-author">${escapeHtml(c.authorName)}</span>
                            <span class="comment-time">${c.createdAt?.toDate().toLocaleString() || ''}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                    </div>
                `;
            });
            document.getElementById('commentsSection').innerHTML = commentsHtml || '<p style="opacity:0.6;">Нет комментариев</p>';
            viewTopicModal.classList.add('active');
        } catch (err) { alert('Ошибка: ' + err.message); }
    };

    document.getElementById('closeViewTopicModal').onclick = () => viewTopicModal.classList.remove('active');

    document.getElementById('addCommentBtn').onclick = async () => {
        if (!currentUser) { alert('Войдите!'); return; }
        const text = document.getElementById('commentInput').value.trim();
        if (!text) return;
        try {
            const user = await getUser(currentUser.uid);
            const avatar = user?.avatarBase64 || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName || currentUser.email)}&background=6a4eff&color=fff`;
            await db.collection('forum_posts').doc(currentPostId).collection('comments').add({
                text,
                authorId: currentUser.uid,
                authorName: currentUser.displayName || currentUser.email.split('@')[0],
                authorAvatar: avatar,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('forum_posts').doc(currentPostId).update({
                commentCount: firebase.firestore.FieldValue.increment(1)
            });
            document.getElementById('commentInput').value = '';
            openTopic(currentPostId);
            loadTopics();
            showToast('Комментарий добавлен!');
        } catch (err) { alert('Ошибка: ' + err.message); }
    };

    function showToast(msg) {
        const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t); setTimeout(() => t.remove(), 2000);
    }

    // Начальная загрузка
    loadTopics();
</script>
</body>
</html>
