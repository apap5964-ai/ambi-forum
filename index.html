<div class="modal" id="viewTopicModal"><div class="modal-card" style="max-width:800px"><div class="modal-header"><h3 id="viewTopicTitle"></h3><span class="close-btn" id="closeViewTopicModal">&times;</span></div><div id="viewTopicContent"></div><div id="commentsSection" style="margin:20px 0"></div><div class="input-group"><textarea id="commentInput" placeholder="Комментарий..."></textarea></div><button class="submit-btn" id="addCommentBtn">Отправить</button></div></div>

<script>
const firebaseConfig={apiKey:"AIzaSyDCaTAB8wBL-VyFXwo5UlBUwwb51LRb2a4",authDomain:"ambi-loader-site.firebaseapp.com",projectId:"ambi-loader-site",storageBucket:"ambi-loader-site.firebasestorage.app",messagingSenderId:"751272275051",appId:"1:751272275051:web:6f9976c1bc05f606a0d52e"};
firebase.initializeApp(firebaseConfig); const auth=firebase.auth(); const db=firebase.firestore();
const CLOUD_NAME="doptuvy8l", UPLOAD_PRESET="forum_preset";
let currentUser=null,currentPostId=null,currentPage='home',userSettings={showOnline:true,receiveEmails:false},isModerator=false;
const profileBtn=document.getElementById('profileBtn'),profileDropdown=document.getElementById('profileDropdown'),guestDropdown=document.getElementById('guestDropdown'),userDropdown=document.getElementById('userDropdown');
const profileAvatar=document.getElementById('profileAvatar'),profileName=document.getElementById('profileName'),dropdownAvatar=document.getElementById('dropdownAvatar'),dropdownName=document.getElementById('dropdownName'),dropdownEmail=document.getElementById('dropdownEmail');
const pageTitle=document.getElementById('pageTitle'),pageContent=document.getElementById('pageContent'),authModal=document.getElementById('authModal');
const sideMenu=document.getElementById('sideMenu'),menuTrigger=document.getElementById('menuTrigger'),menuBtn=document.getElementById('menuBtn');
const modTab=document.getElementById('modTab'), modBadgeDropdown=document.getElementById('modBadgeDropdown');

// Кастомный курсор
const cursor=document.getElementById('customCursor'); let mouseX=0,mouseY=0;
document.addEventListener('mousemove',(e)=>{mouseX=e.clientX;mouseY=e.clientY;if(!document.body.classList.contains('custom-cursor-disabled')){cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';}});
const disableCursorCheck=document.getElementById('disableCursorCheck');
if(disableCursorCheck){disableCursorCheck.addEventListener('change',(e)=>{document.body.classList.toggle('custom-cursor-disabled',e.target.checked);localStorage.setItem('cursor_disabled',e.target.checked);});}
if(localStorage.getItem('cursor_disabled')==='true'){disableCursorCheck.checked=true;document.body.classList.add('custom-cursor-disabled');}

// Меню
function openMenu(){sideMenu.classList.add('active')} function closeMenu(){sideMenu.classList.remove('active')}
menuTrigger.addEventListener('mouseenter',openMenu); sideMenu.addEventListener('mouseleave',closeMenu); menuBtn.addEventListener('click',openMenu);

// Навигация
document.querySelectorAll('[data-page]').forEach(el=>el.addEventListener('click',()=>{
    const page=el.dataset.page; if(page==='new'){if(!currentUser){alert('Войдите');return;} openNewTopicModal(); closeMenu(); return;}
    currentPage=page; renderPage(page); closeMenu(); document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active');
}));
profileBtn.onclick=(e)=>{e.stopPropagation(); profileDropdown.classList.toggle('active');};
document.addEventListener('click',(e)=>{if(!profileBtn.contains(e.target)) profileDropdown.classList.remove('active');});
document.getElementById('menuProfile').onclick=()=>{currentPage='profile';renderPage('profile');profileDropdown.classList.remove('active');};
document.getElementById('menuSettings').onclick=()=>{document.getElementById('settingsModal').classList.add('active');profileDropdown.classList.remove('active');};
document.getElementById('menuLogout').onclick=async()=>{await auth.signOut();profileDropdown.classList.remove('active');};

// Загрузка данных пользователя (роль модератора)
async function loadUserData(uid){
    const cached=localStorage.getItem(`avatar_${uid}`); if(cached){profileAvatar.src=cached;dropdownAvatar.src=cached;}
    const doc=await db.collection('users').doc(uid).get();
    if(doc.exists){const d=doc.data(); if(d.avatarBase64){profileAvatar.src=d.avatarBase64;dropdownAvatar.src=d.avatarBase64;localStorage.setItem(`avatar_${uid}`,d.avatarBase64);}
    else if(!cached){const gen=`https://ui-avatars.com/api/?name=${encodeURIComponent(profileName.textContent)}&background=6a4eff&color=fff`;profileAvatar.src=gen;dropdownAvatar.src=gen;} if(d.settings) userSettings=d.settings;
    isModerator = d.role === 'moderator' || uid === 'apap5964-ai-uid'; // для тебя
    if(isModerator){ modTab.style.display='flex'; modBadgeDropdown.style.display='inline-block'; }
    else{ modTab.style.display='none'; modBadgeDropdown.style.display='none'; }
    } else if(uid==='apap5964-ai-uid'){ isModerator=true; modTab.style.display='flex'; modBadgeDropdown.style.display='inline-block'; }
}
auth.onAuthStateChanged(async user=>{currentUser=user; if(user){const name=user.displayName||user.email.split('@')[0];profileName.textContent=name;dropdownName.textContent=name;dropdownEmail.textContent=user.email;guestDropdown.style.display='none';userDropdown.style.display='block';await loadUserData(user.uid);}else{profileName.textContent='Гость';profileAvatar.src='https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff';dropdownAvatar.src='https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff';guestDropdown.style.display='block';userDropdown.style.display='none';isModerator=false;modTab.style.display='none';modBadgeDropdown.style.display='none';} renderPage(currentPage);});

// Вход/Регистрация (фикс анимации)
const authTabs={login:document.getElementById('loginForm'),register:document.getElementById('registerForm')};
const tabBtns={login:document.getElementById('loginTabBtn'),register:document.getElementById('registerTabBtn')};
function setActiveAuthTab(tab){ 
    Object.keys(authTabs).forEach(k=>authTabs[k].style.display=k===tab?'block':'none');
    Object.keys(tabBtns).forEach(k=>tabBtns[k].style.background=k===tab?'linear-gradient(135deg,#6a4eff,#a855f7)':'rgba(106,78,255,0.2)');
}
document.getElementById('loginTabBtn').onclick=()=>setActiveAuthTab('login');
document.getElementById('registerTabBtn').onclick=()=>setActiveAuthTab('register');
document.getElementById('menuLogin').onclick=()=>{authModal.classList.add('active');setActiveAuthTab('login');profileDropdown.classList.remove('active');};
document.getElementById('menuRegister').onclick=()=>{authModal.classList.add('active');setActiveAuthTab('register');profileDropdown.classList.remove('active');};
document.getElementById('closeAuthModal').onclick=()=>authModal.classList.remove('active');
document.getElementById('loginForm').onsubmit=async(e)=>{e.preventDefault();try{await auth.signInWithEmailAndPassword(loginEmail.value,loginPassword.value);authModal.classList.remove('active');}catch(err){alert(err.message);}};
document.getElementById('registerForm').onsubmit=async(e)=>{e.preventDefault();if(regPassword.value!==regConfirm.value){alert('Пароли не совпадают');return;} try{const cred=await auth.createUserWithEmailAndPassword(regEmail.value,regPassword.value);await cred.user.updateProfile({displayName:regUsername.value});await db.collection('users').doc(cred.user.uid).set({displayName:regUsername.value,email:regEmail.value,avatarBase64:'',settings:{showOnline:true,receiveEmails:false}},{merge:true});authModal.classList.remove('active');}catch(err){alert(err.message);}};

// Смена аватарки
const hiddenAvatarInput=document.createElement('input');hiddenAvatarInput.type='file';hiddenAvatarInput.accept='image/*';
hiddenAvatarInput.onchange=async(e)=>{const file=e.target.files[0];if(!file||!currentUser)return;const reader=new FileReader();reader.onload=async(ev)=>{const base64=ev.target.result;profileAvatar.src=base64;dropdownAvatar.src=base64;localStorage.setItem(`avatar_${currentUser.uid}`,base64);await db.collection('users').doc(currentUser.uid).set({avatarBase64:base64},{merge:true});showToast('Аватар обновлён!');};reader.readAsDataURL(file);};
document.getElementById('menuChangeAvatar').onclick=()=>hiddenAvatarInput.click();

// Рендер страниц
async function renderPage(page){
    pageTitle.textContent=page==='home'?'Главная':page==='profile'?'Профиль':page==='moderation'?'Модерация':'Настройки';
    if(page==='home'){
        pageContent.innerHTML=`<div class="forum-grid"><div class="topics-area"><div class="section-header"><h2>🔥 Последние темы</h2><button class="submit-btn" style="width:auto;padding:10px 20px" id="createTopicInline">+ Новая тема</button></div><div id="topicsList"></div></div><div class="right-sidebar"><h3>❤️ Популярные темы</h3><div id="popularTopics"></div><h3 style="margin-top:25px">💬 Последние ответы</h3><div id="recentComments"></div></div></div>`;
        document.getElementById('createTopicInline').onclick=openNewTopicModal;
        loadTopics(); loadPopularTopics();
    }else if(page==='profile'){
        if(!currentUser){pageContent.innerHTML='<p>Войдите для просмотра</p>';return;}
        const doc=await db.collection('users').doc(currentUser.uid).get(); const data=doc.data()||{};
        const isMod=data.role==='moderator'||currentUser.uid==='apap5964-ai-uid';
        pageContent.innerHTML=`<div style="background:rgba(20,20,40,0.5);border-radius:24px;padding:30px"><div style="display:flex;align-items:center;gap:20px"><img src="${data.avatarBase64||'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName||currentUser.email)}" style="width:80px;height:80px;border-radius:50%;border:3px solid #6a4eff"><div><h2>${currentUser.displayName||currentUser.email} ${isMod?'<span class="badge-moderator">🛡️ Модератор</span>':''}</h2><p>${currentUser.email}</p></div></div><h3>Ваши темы</h3><div id="userTopics"></div></div>`;
        loadUserTopics();
    }else if(page==='moderation'){
        if(!isModerator){pageContent.innerHTML='<p>Доступ запрещён</p>';return;}
        pageContent.innerHTML=`<h2>🛡️ Модерация</h2><div id="modTopicsList"></div>`;
        loadAllTopicsForMod();
    }
}

async function loadTopics(term=''){const container=document.getElementById('topicsList'); if(!container)return; let q=db.collection('forum_posts').orderBy('createdAt','desc'); if(term) q=q.where('title','>=',term).where('title','<=',term+'\uf8ff'); const snap=await q.limit(20).get(); let html=''; snap.forEach(d=>{const p=d.data(); html+=topicCard(d.id,p);}); container.innerHTML=html||'<p>Нет тем</p>';}
async function loadPopularTopics(){const container=document.getElementById('popularTopics'); if(!container)return; const snap=await db.collection('forum_posts').orderBy('likes','desc').limit(5).get(); let html=''; snap.forEach(d=>{const p=d.data(); html+=`<div class="recent-item" onclick="openTopic('${d.id}')"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}"><div><strong>${escapeHtml(p.title)}</strong><br><span style="opacity:0.7">❤️ ${p.likes||0}</span></div></div>`;}); container.innerHTML=html||'<p>Нет тем</p>';}
async function loadUserTopics(){const snap=await db.collection('forum_posts').where('authorId','==',currentUser.uid).orderBy('createdAt','desc').get(); let html=''; snap.forEach(d=>{const p=d.data(); html+=topicCard(d.id,p);}); document.getElementById('userTopics').innerHTML=html||'<p>У вас нет тем</p>';}
async function loadAllTopicsForMod(){const snap=await db.collection('forum_posts').orderBy('createdAt','desc').get(); let html=''; snap.forEach(d=>{const p=d.data(); html+=`<div class="topic-card"><div class="topic-title">${escapeHtml(p.title)}</div><div class="topic-meta">${p.createdAt?.toDate().toLocaleString()}</div><button onclick="deletePost('${d.id}')">🗑️ Удалить</button> <button onclick="editPost('${d.id}')">✏️</button> <button onclick="toggleVerified('${d.id}',${!p.verified})">${p.verified?'✅':'⬜'}</button></div>`;}); document.getElementById('modTopicsList').innerHTML=html;}

function topicCard(id,p){return `<div class="topic-card" onclick="openTopic('${id}')"><div class="topic-title">${escapeHtml(p.title)} ${p.verified?'✅':''}</div><div class="topic-meta"><span>📅 ${p.createdAt?.toDate().toLocaleString()||''}</span><span>💬 ${p.commentCount||0}</span><span>❤️ ${p.likes||0}</span></div><div class="topic-author"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}"> ${escapeHtml(p.authorName)} ${p.authorIsMod?'<span class="badge-moderator">🛡️</span>':''}</div></div>`;}

// Множественная загрузка файлов
let uploadedFiles=[];
function openNewTopicModal(){ document.getElementById('newTopicModal').classList.add('active'); uploadedFiles=[]; updateFilePreview(); }
document.getElementById('closeNewTopicModal').onclick=()=>document.getElementById('newTopicModal').classList.remove('active');
document.getElementById('topicFileUpload').onclick=()=>document.getElementById('topicFileInput').click();
document.getElementById('topicFileInput').onchange=async(e)=>{
    const files=Array.from(e.target.files);
    for(const file of files){
        const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',UPLOAD_PRESET);
        const endpoint=file.type.startsWith('image/')? `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`:`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`;
        try{ const res=await fetch(endpoint,{method:'POST',body:fd}); const data=await res.json();
            uploadedFiles.push({url:data.secure_url,name:file.name,type:file.type,size:file.size});
        }catch(err){alert('Ошибка загрузки '+file.name);}
    }
    updateFilePreview();
};
function updateFilePreview(){
    const prev=document.getElementById('filePreview'); let html='';
    uploadedFiles.forEach((f,i)=>{
        if(f.type.startsWith('image/')) html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><img src="${f.url}" style="max-width:100px;max-height:100px;border-radius:8px"><div style="flex:1">${f.name}</div><button onclick="moveFile(${i},'up')">⬆️</button><button onclick="moveFile(${i},'down')">⬇️</button><button onclick="removeFile(${i})">❌</button></div>`;
        else html+=`<div class="file-attachment"><span class="file-icon">📄</span><div class="file-info"><a href="${f.url}" target="_blank" class="file-name">${f.name}</a><div class="file-size">${(f.size/1024).toFixed(1)} KB</div></div><button onclick="moveFile(${i},'up')">⬆️</button><button onclick="moveFile(${i},'down')">⬇️</button><button onclick="removeFile(${i})">❌</button></div>`;
    });
    prev.innerHTML=html;
}
window.moveFile=(index,dir)=>{ if(dir==='up'&&index>0){[uploadedFiles[index-1],uploadedFiles[index]]=[uploadedFiles[index],uploadedFiles[index-1]];} else if(dir==='down'&&index<uploadedFiles.length-1){[uploadedFiles[index],uploadedFiles[index+1]]=[uploadedFiles[index+1],uploadedFiles[index]];} updateFilePreview(); };
window.removeFile=(index)=>{ uploadedFiles.splice(index,1); updateFilePreview(); };

document.getElementById('createTopicBtn').onclick=async()=>{
    if(!currentUser){alert('Войдите');return;}
    const title=document.getElementById('topicTitle').value.trim(); const content=document.getElementById('topicContent').value.trim();
    if(!title||!content){alert('Заполните заголовок и текст');return;}
    const authorName=currentUser.displayName||currentUser.email; const userDoc=await db.collection('users').doc(currentUser.uid).get(); const avatar=userDoc.data()?.avatarBase64||'';
    const isMod=userDoc.data()?.role==='moderator'||currentUser.uid==='apap5964-ai-uid';
    await db.collection('forum_posts').add({
        title,content,files:uploadedFiles,authorId:currentUser.uid,authorName,authorAvatar:avatar,authorIsMod:isMod,createdAt:firebase.firestore.FieldValue.serverTimestamp(),likes:0,commentCount:0,verified:false
    });
    document.getElementById('newTopicModal').classList.remove('active'); uploadedFiles=[]; updateFilePreview(); document.getElementById('topicTitle').value=document.getElementById('topicContent').value='';
    if(currentPage==='home') loadTopics(); showToast('Тема создана!');
};

// Открытие темы
window.openTopic=async(postId)=>{
    currentPostId=postId; const doc=await db.collection('forum_posts').doc(postId).get(); const post=doc.data();
    const modal=document.getElementById('viewTopicModal'); document.getElementById('viewTopicTitle').textContent=post.title;
    let contentHtml=`<div style="display:flex;gap:15px;margin-bottom:20px"><img src="${post.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(post.authorName)}" style="width:40px;height:40px;border-radius:50%"><div><strong>${escapeHtml(post.authorName)} ${post.authorIsMod?'<span class="badge-moderator">🛡️</span>':''}</strong><br>${post.createdAt?.toDate().toLocaleString()}</div></div>`;
    contentHtml+=`<div>${escapeHtml(post.content)}</div>`;
    if(post.files&&post.files.length){
        contentHtml+='<div style="margin-top:20px"><h4>📎 Вложения:</h4>';
        post.files.forEach(f=>{ if(f.type.startsWith('image/')) contentHtml+=`<img src="${f.url}" style="max-width:100%;border-radius:12px;margin:5px 0">`;
            else contentHtml+=`<div class="file-attachment"><span class="file-icon">📄</span><div class="file-info"><a href="${f.url}" target="_blank" class="file-name">${f.name}</a><div class="file-size">${(f.size/1024).toFixed(1)} KB</div></div></div>`; });
        contentHtml+='</div>';
    }
    document.getElementById('viewTopicContent').innerHTML=contentHtml;
    // Лайк
    const likeBtn=document.createElement('button'); likeBtn.className='like-btn'; likeBtn.innerHTML=`❤️ ${post.likes||0}`; likeBtn.onclick=()=>likePost(postId);
    document.getElementById('viewTopicContent').append(likeBtn);
    // Комментарии
    const commentsSnap=await db.collection('forum_posts').doc(postId).collection('comments').orderBy('createdAt').get();
    let commHtml=''; commentsSnap.forEach(c=>{ const d=c.data(); commHtml+=`<div style="background:rgba(30,30,50,0.5);padding:10px;border-radius:12px;margin-bottom:10px"><strong>${d.authorName}</strong>: ${d.text}</div>`; });
    document.getElementById('commentsSection').innerHTML=commHtml;
    modal.classList.add('active');
};
document.getElementById('closeViewTopicModal').onclick=()=>document.getElementById('viewTopicModal').classList.remove('active');
document.getElementById('addCommentBtn').onclick=async()=>{
    if(!currentUser) return alert('Войдите');
    const text=document.getElementById('commentInput').value.trim(); if(!text) return;
    await db.collection('forum_posts').doc(currentPostId).collection('comments').add({text,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection('forum_posts').doc(currentPostId).update({commentCount:firebase.firestore.FieldValue.increment(1)});
    document.getElementById('commentInput').value=''; openTopic(currentPostId);
};

async function likePost(postId){ if(!currentUser) return alert('Войдите'); const ref=db.collection('forum_posts').doc(postId); await ref.update({likes:firebase.firestore.FieldValue.increment(1)}); openTopic(postId); }

// Модерация
window.deletePost=async(postId)=>{ if(confirm('Удалить пост?')){ await db.collection('forum_posts').doc(postId).delete(); loadAllTopicsForMod(); } };
window.editPost=async(postId)=>{ const doc=await db.collection('forum_posts').doc(postId).get(); const p=doc.data(); document.getElementById('editPostTitle').value=p.title; document.getElementById('editPostContent').value=p.content; document.getElementById('editPostModal').classList.add('active'); document.getElementById('saveEditPostBtn').onclick=async()=>{ await db.collection('forum_posts').doc(postId).update({title:document.getElementById('editPostTitle').value,content:document.getElementById('editPostContent').value}); document.getElementById('editPostModal').classList.remove('active'); loadAllTopicsForMod(); }; };
window.toggleVerified=async(postId,val)=>{ await db.collection('forum_posts').doc(postId).update({verified:val}); loadAllTopicsForMod(); };
document.getElementById('closeEditPostModal').onclick=()=>document.getElementById('editPostModal').classList.remove('active');

// Поиск
document.getElementById('searchInput').addEventListener('input',e=>{if(currentPage==='home') loadTopics(e.target.value);});

// Настройки
document.getElementById('saveSettingsBtn').onclick=async()=>{if(!currentUser)return; const s={showOnline:document.getElementById('showOnline').checked,receiveEmails:document.getElementById('receiveEmails').checked}; await db.collection('users').doc(currentUser.uid).set({settings:s},{merge:true}); showToast('Настройки сохранены'); document.getElementById('settingsModal').classList.remove('active');};
document.getElementById('closeSettingsModal').onclick=()=>document.getElementById('settingsModal').classList.remove('active');

function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

// Фон
function bg(){let c=document.getElementById('neon-balls'); for(let i=0;i<15;i++){let b=document.createElement('div');b.className='neon-ball';b.style.width=b.style.height=(120+Math.random()*200)+'px';b.style.left=Math.random()*100+'%';b.style.top=Math.random()*100+'%';b.style.background=['#6a4eff','#a855f7','#ec4899'][i%3];c.appendChild(b);}
c=document.getElementById('particles'); for(let i=0;i<80;i++){let p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*8+'s';c.appendChild(p);}
c=document.getElementById('stars'); for(let i=0;i<150;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';c.appendChild(s);}} bg();
renderPage('home');
</script></body></html>
