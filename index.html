<body>
<div class="gradient-bg"></div><div id="neon-balls"></div><div id="particles"></div><div id="stars"></div>

<div class="main-content">
    <div class="header">
        <div style="display:flex;align-items:center;gap:20px"><div class="menu-btn" id="menuBtn">☰</div><div class="page-title" id="pageTitle">Главная</div></div>

            <div class="profile-btn" id="profileBtn"><img id="profileAvatar" src="https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff"><span id="profileName">Гость</span><span>▼</span></div>
            <div class="dropdown-panel" id="profileDropdown">
                <div id="guestDropdown"><div class="menu-item" id="menuLogin">🔑 Войти</div><div class="menu-item" id="menuRegister">📝 Регистрация</div></div>
                <div id="userDropdown" style="display:none">
                    <div style="display:flex;align-items:center;gap:12px;padding:10px"><img id="dropdownAvatar" src="https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff" style="width:40px;height:40px;border-radius:50%"><div><strong id="dropdownName"></strong><span id="modBadgeDropdown" class="badge-moderator" style="display:none">🛡️</span><span id="adminBadgeDropdown" class="badge-admin" style="display:none">👑</span><br><span id="dropdownEmail" style="opacity:.7;font-size:.9rem"></span></div></div><hr>
                    <div class="menu-item" id="menuProfile">👤 Профиль</div><div class="menu-item" id="menuChangeAvatar">📷 Сменить аватар</div><hr><div class="menu-item" id="menuLogout">🚪 Выйти</div>
                </div>
            </div>
        </div>
    </div>
    <div id="pageContent"></div>
</div>

<!-- Модалки -->
<div class="modal" id="authModal"><div class="modal-card"><div class="modal-header"><h3>Вход</h3><span class="close-btn" id="closeAuthModal">&times;</span></div><div style="display:flex;gap:10px;margin-bottom:20px"><button class="submit-btn" id="loginTabBtn">LOGIN</button><button class="submit-btn" id="registerTabBtn" style="background:rgba(106,78,255,.2)">REGISTER</button></div><form id="loginForm"><div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div><button class="submit-btn">Войти</button></form><form id="registerForm" style="display:none"><div class="input-group"><input type="text" id="regUsername" placeholder="Имя"></div><div class="input-group"><input type="email" id="regEmail" placeholder="Email"></div><div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div><div class="input-group"><input type="password" id="regConfirm" placeholder="Подтверждение"></div><button class="submit-btn">Зарегистрироваться</button></form></div></div>
<div class="modal" id="newTopicModal"><div class="modal-card"><div class="modal-header"><h3>📝 Новая тема</h3><span class="close-btn" id="closeNewTopicModal">&times;</span></div><div class="input-group"><input type="text" id="topicTitle" placeholder="Заголовок"></div><div class="editor-toolbar"><button type="button" id="insertImageBtn">🖼️ Вставить картинку</button><button type="button" id="attachFileBtn">📎 Прикрепить файл</button></div><div class="input-group"><textarea id="topicContent" placeholder="Текст" style="height:200px"></textarea></div><div id="filePreview"></div><input type="file" id="topicFileInput" multiple style="display:none"><button class="submit-btn" id="createTopicBtn">Опубликовать</button></div></div>
<div class="modal" id="viewTopicModal"><div class="modal-card"><div class="modal-header"><h3 id="viewTopicTitle"></h3><span class="close-btn" id="closeViewTopicModal">&times;</span></div><div id="viewTopicContent"></div><div id="commentsSection" style="margin:20px 0"></div><div class="input-group"><textarea id="commentInput" placeholder="Комментарий..."></textarea></div><button class="submit-btn" id="addCommentBtn">Отправить</button></div></div>
<div class="modal" id="editPostModal"><div class="modal-card"><div class="modal-header"><h3>✏️ Редактировать</h3><span class="close-btn" id="closeEditPostModal">&times;</span></div><div class="input-group"><input type="text" id="editPostTitle"></div><div class="editor-toolbar"><button type="button" id="editInsertImageBtn">🖼️ Вставить</button><button type="button" id="editAttachFileBtn">📎 Файл</button></div><div class="input-group"><textarea id="editPostContent" style="height:200px"></textarea></div><div id="editFilePreview"></div><button class="submit-btn" id="saveEditPostBtn">Сохранить</button></div></div>
<div class="modal" id="profileModal"><div class="modal-card" style="max-width:500px"><div class="modal-header"><h3 id="profileModalTitle"></h3><span class="close-btn" id="closeProfileModal">&times;</span></div><div id="profileModalContent"></div></div></div>
<div class="modal" id="reportsModal"><div class="modal-card"><div class="modal-header"><h3>⚠️ Жалобы</h3><span class="close-btn" id="closeReportsModal">&times;</span></div><div id="reportsList"></div></div></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDCaTAB8wBL-VyFXwo5UlBUwwb51LRb2a4",authDomain:"ambi-loader-site.firebaseapp.com",projectId:"ambi-loader-site",storageBucket:"ambi-loader-site.firebasestorage.app",messagingSenderId:"751272275051",appId:"1:751272275051:web:6f9976c1bc05f606a0d52e"};
firebase.initializeApp(firebaseConfig); const auth=firebase.auth(); const db=firebase.firestore();
const CLOUD_NAME="doptuvy8l", UPLOAD_PRESET="forum_preset";
const ADMIN_UID="Gs8CNzqqjuQZOYgrzetr4HsSJT42";

let currentUser=null, currentPage='home', isAdmin=false, isModerator=false, onlineUsers=new Set();
const profileBtn=document.getElementById('profileBtn'), profileDropdown=document.getElementById('profileDropdown'), guestDropdown=document.getElementById('guestDropdown'), userDropdown=document.getElementById('userDropdown');
const profileAvatar=document.getElementById('profileAvatar'), profileName=document.getElementById('profileName'), dropdownAvatar=document.getElementById('dropdownAvatar'), dropdownName=document.getElementById('dropdownName'), dropdownEmail=document.getElementById('dropdownEmail');
const modBadgeDropdown=document.getElementById('modBadgeDropdown'), adminBadgeDropdown=document.getElementById('adminBadgeDropdown');
const sideMenu=document.getElementById('sideMenu'), menuTrigger=document.getElementById('menuTrigger'), menuBtn=document.getElementById('menuBtn');
const modTab=document.getElementById('modTab'), adminTab=document.getElementById('adminTab');
const pageTitle=document.getElementById('pageTitle'), pageContent=document.getElementById('pageContent');

// Курсор
const cursor=document.getElementById('customCursor'); let mouseX=0,mouseY=0;
document.addEventListener('mousemove',(e)=>{mouseX=e.clientX;mouseY=e.clientY;if(!document.body.classList.contains('custom-cursor-disabled')){cursor.style.left=mouseX+'px';cursor.style.top=mouseY+'px';}});
const disableCursorCheck=document.getElementById('disableCursorCheck');
if(disableCursorCheck){disableCursorCheck.addEventListener('change',(e)=>{document.body.classList.toggle('custom-cursor-disabled',e.target.checked);localStorage.setItem('cursor_disabled',e.target.checked);});}
if(localStorage.getItem('cursor_disabled')==='true'){disableCursorCheck.checked=true;document.body.classList.add('custom-cursor-disabled');}

// Меню
function openMenu(){sideMenu.classList.add('active')} function closeMenu(){sideMenu.classList.remove('active')}
menuTrigger.addEventListener('mouseenter',openMenu); sideMenu.addEventListener('mouseleave',closeMenu); menuBtn.addEventListener('click',openMenu);

// Навигация
document.querySelectorAll('[data-page]').forEach(el=>el.addEventListener('click',()=>{
    const page=el.dataset.page; if(page==='new'){ openNewTopicModal(); closeMenu(); return; }
    if(page==='users'&&!isAdmin){ alert('Только админ'); return; }
    if(page==='moderation'&&!isModerator){ alert('Нет доступа'); return; }
    currentPage=page; renderPage(page); closeMenu();
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active');
}));
profileBtn.onclick=(e)=>{e.stopPropagation(); profileDropdown.classList.toggle('active');};
document.addEventListener('click',(e)=>{if(!profileBtn.contains(e.target)) profileDropdown.classList.remove('active');});
document.getElementById('menuProfile').onclick=()=>{currentPage='profile';renderPage('profile');profileDropdown.classList.remove('active');};
document.getElementById('menuLogout').onclick=async()=>{await auth.signOut();profileDropdown.classList.remove('active');};

// Вход/Регистрация
const authModal=document.getElementById('authModal'), loginForm=document.getElementById('loginForm'), registerForm=document.getElementById('registerForm');
const loginTab=document.getElementById('loginTabBtn'), registerTab=document.getElementById('registerTabBtn');
loginTab.onclick=()=>{loginForm.style.display='block';registerForm.style.display='none';loginTab.style.background='linear-gradient(135deg,#6a4eff,#a855f7)';registerTab.style.background='rgba(106,78,255,.2)';};
registerTab.onclick=()=>{loginForm.style.display='none';registerForm.style.display='block';registerTab.style.background='linear-gradient(135deg,#6a4eff,#a855f7)';loginTab.style.background='rgba(106,78,255,.2)';};
document.getElementById('menuLogin').onclick=()=>{authModal.classList.add('active');loginTab.click();profileDropdown.classList.remove('active');};
document.getElementById('menuRegister').onclick=()=>{authModal.classList.add('active');registerTab.click();profileDropdown.classList.remove('active');};
document.getElementById('closeAuthModal').onclick=()=>authModal.classList.remove('active');
loginForm.onsubmit=async(e)=>{e.preventDefault(); try{await auth.signInWithEmailAndPassword(loginEmail.value,loginPassword.value);authModal.classList.remove('active');}catch(err){alert(err.message);}};
registerForm.onsubmit=async(e)=>{e.preventDefault(); if(regPassword.value!==regConfirm.value){alert('Пароли не совпадают');return;} try{const cred=await auth.createUserWithEmailAndPassword(regEmail.value,regPassword.value);await cred.user.updateProfile({displayName:regUsername.value});await db.collection('users').doc(cred.user.uid).set({displayName:regUsername.value,email:regEmail.value,avatarBase64:''});authModal.classList.remove('active');}catch(err){alert(err.message);}};

// Загрузка пользователя
async function loadUserData(uid){
    const docRef=db.collection('users').doc(uid); const snap=await docRef.get();
    if(snap.exists){ const data=snap.data();
        if(data.avatarBase64){ profileAvatar.src=data.avatarBase64; dropdownAvatar.src=data.avatarBase64; }
        else{ const gen=`https://ui-avatars.com/api/?name=${encodeURIComponent(profileName.textContent)}&background=6a4eff&color=fff`; profileAvatar.src=gen; dropdownAvatar.src=gen; }
        isAdmin=(data.role==='admin'||uid===ADMIN_UID);
        isModerator=(data.role==='moderator'||isAdmin);
        modTab.style.display=isModerator?'flex':'none'; adminTab.style.display=isAdmin?'flex':'none';
        modBadgeDropdown.style.display=isModerator?'inline-block':'none'; adminBadgeDropdown.style.display=isAdmin?'inline-block':'none';
        if(data.settings?.showOnline!==false) onlineUsers.add(uid);
    }else if(uid===ADMIN_UID){ isAdmin=true; isModerator=true; modTab.style.display='flex'; adminTab.style.display='flex'; modBadgeDropdown.style.display='inline-block'; adminBadgeDropdown.style.display='inline-block'; onlineUsers.add(uid); }
}

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function getUserAvatar(data) { return data?.avatarBase64 || `https://ui-avatars.com/api/?name=${encodeURIComponent(data?.displayName || 'User')}&background=6a4eff&color=fff`; }
function getFrameClass(role, achievements) {
    if (role === 'admin') return 'frame-admin';
    if (role === 'moderator') return 'frame-moderator';
    if (achievements?.includes('verified_5')) return 'frame-gold';
    if (achievements?.includes('verified_10')) return 'frame-diamond';
    return '';
}

// ========== ЗАГРУЗКА ФАЙЛОВ ==========
async function uploadFiles(files) {
    const uploaded = [];
    for (const file of files) {
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        const endpoint = file.type.startsWith('image/') ? `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload` : `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`;
        try {
            const res = await fetch(endpoint, { method: 'POST', body: fd }); const data = await res.json();
            uploaded.push({ url: data.secure_url, name: file.name, type: file.type, size: file.size });
        } catch (err) { alert('Ошибка загрузки ' + file.name); }
    }
    return uploaded;
}

function updateFilePreview(containerId = 'filePreview', filesArray = uploadedFiles, editable = true) {
    const prev = document.getElementById(containerId);
    let html = '';
    filesArray.forEach((f, i) => {
        if (f.type?.startsWith('image/')) html += `<div style="display:flex;align-items:center;gap:10px;margin:5px 0"><img src="${f.url}" style="max-width:100px;max-height:100px;border-radius:8px"><span>${f.name}</span>${editable ? `<button type="button" onclick="removeFile(${i}, '${containerId}')">❌</button>` : ''}</div>`;
        else html += `<div style="display:flex;align-items:center;gap:10px;margin:5px 0">📄 ${f.name}${editable ? `<button type="button" onclick="removeFile(${i}, '${containerId}')">❌</button>` : ''}</div>`;
    });
    prev.innerHTML = html;
}
window.removeFile = (index, containerId) => {
    if (containerId === 'filePreview') uploadedFiles.splice(index, 1);
    else if (containerId === 'editFilePreview') editingUploadedFiles.splice(index, 1);
    updateFilePreview(containerId, containerId === 'filePreview' ? uploadedFiles : editingUploadedFiles, true);
};

function insertAtCursor(textarea, textToInsert) {
    const start = textarea.selectionStart, end = textarea.selectionEnd;
    textarea.value = textarea.value.substring(0, start) + textToInsert + textarea.value.substring(end);
    textarea.selectionStart = textarea.selectionEnd = start + textToInsert.length;
    textarea.focus();
}

function loadAchievements(uid, currentAchievements) {

        { id: 'first_post', title: 'Первый пост', desc: 'Опубликуйте свою первую тему', target: 1, icon: '📝' },

async function loadTopics(term = '') {
    const container = document.getElementById('topicsList'); if (!container) return;
    let q = db.collection('forum_posts').orderBy('createdAt', 'desc').limit(20);
    if (term) q = q.where('title', '>=', term).where('title', '<=', term + '\uf8ff');
    const snap = await q.get(); let html = '';
    snap.forEach(d => { const p = d.data(); html += topicCard(d.id, p); });
    container.innerHTML = html || '<p>Нет тем</p>';
}
function topicCard(id, p) {
    const frameClass = getFrameClass(p.authorRole, p.authorAchievements);
    const isOnline = onlineUsers.has(p.authorId);
    return `<div class="topic-card ${p.authorRole === 'admin' ? 'post-admin' : p.authorRole === 'moderator' ? 'post-moderator' : ''}" data-post-id="${id}">
        <div class="topic-title">${escapeHtml(p.title)} ${p.verified ? '<span class="verified-badge">✅</span>' : ''}</div>
        <div class="topic-meta"><span>📅 ${p.createdAt?.toDate().toLocaleString() || ''}</span><span>💬 ${p.commentCount || 0}</span><span>❤️ ${p.likes || 0}</span></div>

            </div>

async function loadReports() {

    document.getElementById('reportsList').innerHTML = html || '<p>Нет жалоб</p>';
}
window.resolveReport = async (reportId, action) => {
    const report = await db.collection('reports').doc(reportId).get(); const data = report.data();
    if (action === 'delete') {
        if (data.type === 'post') await db.collection('forum_posts').doc(data.targetId).delete();
        else if (data.type === 'comment') { const parts = data.commentPath?.split('/') || []; if (parts.length) await db.collection('forum_posts').doc(parts[1]).collection('comments').doc(parts[3]).delete(); }
    }
    await db.collection('reports').doc(reportId).update({ status: 'resolved' });
    loadReports(); showToast('Обработано');
};

};
document.getElementById('editInsertImageBtn').onclick = () => document.getElementById('editFileInput')?.click();
document.getElementById('editAttachFileBtn').onclick = () => document.getElementById('editFileInput')?.click();
document.getElementById('saveEditPostBtn').onclick = async () => {
    if (!currentEditingPostId) return;
    const newTitle = document.getElementById('editPostTitle').value.trim();
    const newContent = document.getElementById('editPostContent').value.trim();
    if (!newTitle || !newContent) { alert('Заполните поля'); return; }
    await db.collection('forum_posts').doc(currentEditingPostId).update({ title: newTitle, content: newContent, files: editingUploadedFiles });
    document.getElementById('editPostModal').classList.remove('active'); currentEditingPostId = null; editingUploadedFiles = [];
    if (currentPage === 'moderation') loadModTopics(); else if (currentPage === 'home') loadTopics();
    showToast('Пост обновлён!');
};
document.getElementById('closeEditPostModal').onclick = () => document.getElementById('editPostModal').classList.remove('active');

// ========== УДАЛЕНИЕ ПОСТА / ВЕРИФИКАЦИЯ / ПРОФИЛЬ ==========
window.deletePost = async (id) => { if (confirm('Удалить пост?')) { await db.collection('forum_posts').doc(id).delete(); if (currentPage === 'moderation') loadModTopics(); else loadTopics(); showToast('Пост удалён'); } };
window.toggleVerified = async (id, val) => { await db.collection('forum_posts').doc(id).update({ verified: val }); if (currentPage === 'moderation') loadModTopics(); };
window.showProfile = async (uid) => { currentProfileUid = uid; currentPage = 'profile'; renderPage('profile'); };

// ========== ФОН ==========
function bg(){let c=document.getElementById('neon-balls'); for(let i=0;i<15;i++){let b=document.createElement('div');b.className='neon-ball';b.style.width=b.style.height=(120+Math.random()*200)+'px';b.style.left=Math.random()*100+'%';b.style.top=Math.random()*100+'%';b.style.background=['#6a4eff','#a855f7','#ec4899'][i%3];c.appendChild(b);} c=document.getElementById('particles'); for(let i=0;i<80;i++){let p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*8+'s';c.appendChild(p);} c=document.getElementById('stars'); for(let i=0;i<150;i++){let s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';c.appendChild(s);}} bg();
renderPage('home');
</script>
