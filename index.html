<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AMBI FORUM — Сообщество</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;font-family:'Inter',sans-serif;color:#fff;min-height:100vh}::-webkit-scrollbar{width:0;background:0 0}
        .side-menu{position:fixed;left:0;top:0;height:100vh;width:280px;background:rgba(10,10,20,0.95);backdrop-filter:blur(15px);border-right:1px solid rgba(106,78,255,0.3);transform:translateX(-100%);transition:transform 0.3s;z-index:1000;padding:30px 20px;overflow-y:auto}.side-menu.active{transform:translateX(0)}.menu-trigger{position:fixed;left:0;top:0;width:20px;height:100vh;z-index:999}.logo{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#6a4eff,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:30px;text-align:center}.nav-item{padding:14px 18px;border-radius:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.7)}.nav-item:hover,.nav-item.active{background:rgba(106,78,255,0.15);color:#fff;border-left:3px solid #6a4eff}.nav-section{margin-top:25px}.nav-section-title{font-size:.8rem;text-transform:uppercase;opacity:.5;margin-bottom:10px;padding-left:18px}.search-box{margin:20px 0}.search-box input{width:100%;padding:14px 18px;background:rgba(20,20,40,.8);border:1px solid rgba(106,78,255,0.4);border-radius:40px;color:#fff;outline:0}
        .main-content{padding:25px 30px;max-width:1200px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}.page-title{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#fff,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent}.menu-btn{background:rgba(20,20,35,0.8);backdrop-filter:blur(5px);border:1px solid rgba(106,78,255,0.3);padding:12px 20px;border-radius:40px;cursor:pointer;font-size:1.5rem}
        .profile-dropdown{position:relative}.profile-btn{display:flex;align-items:center;gap:12px;background:rgba(20,20,35,0.8);backdrop-filter:blur(5px);border:1px solid rgba(106,78,255,0.3);padding:8px 16px;border-radius:40px;cursor:pointer}.profile-btn img{width:36px;height:36px;border-radius:50%;border:2px solid #6a4eff}.dropdown-panel{position:absolute;top:calc(100% + 10px);right:0;width:260px;background:rgba(10,10,20,0.95);backdrop-filter:blur(15px);border-radius:20px;padding:15px;border:1px solid rgba(106,78,255,0.3);display:none;z-index:100}.dropdown-panel.active{display:block}.dropdown-panel .menu-item{padding:12px 15px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px}.dropdown-panel .menu-item:hover{background:rgba(106,78,255,0.2)}
        .forum-grid{display:grid;grid-template-columns:1fr 320px;gap:25px}.topics-area{background:rgba(20,20,40,0.5);backdrop-filter:blur(5px);border-radius:24px;padding:20px;border:1px solid rgba(106,78,255,0.2)}.section-header{display:flex;justify-content:space-between;margin-bottom:20px}.topic-card{background:rgba(10,10,20,0.6);border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid rgba(106,78,255,0.2);cursor:pointer}.topic-title{font-size:1.2rem;font-weight:700;color:#a855f7}.topic-meta{display:flex;gap:20px;font-size:.8rem;opacity:.7}.topic-author{display:flex;align-items:center;gap:8px}.topic-author img{width:20px;height:20px;border-radius:50%}.right-sidebar{background:rgba(20,20,40,0.3);backdrop-filter:blur(5px);border-radius:20px;padding:20px;border:1px solid rgba(106,78,255,0.2)}.right-sidebar h3{margin-bottom:15px;color:#a855f7}.recent-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(106,78,255,0.1);cursor:pointer}
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1001;display:none;align-items:center;justify-content:center}.modal.active{display:flex}.modal-card{background:rgba(20,20,40,0.9);backdrop-filter:blur(15px);border-radius:30px;padding:30px;width:90%;max-width:800px;max-height:85vh;overflow-y:auto}.modal-header{display:flex;justify-content:space-between;margin-bottom:20px}.close-btn{font-size:24px;cursor:pointer}
        .input-group{margin-bottom:20px}.input-group input,.input-group textarea{width:100%;padding:14px;background:rgba(10,10,20,0.6);border:1px solid rgba(106,78,255,0.3);border-radius:16px;color:#fff;outline:0}.submit-btn{background:linear-gradient(135deg,#6a4eff,#a855f7);padding:14px;border:none;border-radius:30px;color:#fff;font-weight:700;width:100%;cursor:pointer}
        .badge-admin{background:linear-gradient(135deg,#fbbf24,#f97316);padding:2px 8px;border-radius:20px;font-size:.7rem;margin-left:8px;color:#000}.badge-moderator{background:linear-gradient(135deg,#6a4eff,#a855f7);padding:2px 8px;border-radius:20px;font-size:.7rem;margin-left:8px;color:#fff}
        .comment-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid #6a4eff}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6a4eff,#a855f7);padding:10px 20px;border-radius:50px;z-index:9999;animation:toastFade 2s ease-out}
        @keyframes toastFade{0%{opacity:0;transform:translateX(-50%) translateY(20px)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}
    </style>
</head>
<body>
<div class="menu-trigger" id="menuTrigger"></div>
<div class="side-menu" id="sideMenu">
    <div class="logo">💬 AMBI</div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="🔍 Поиск тем..."></div>

    <div class="nav-item" data-page="users" id="adminTab" style="display:none"><i>👥</i> Пользователи</div>
    <div class="nav-section"><div class="nav-section-title">Сообщество</div><div class="nav-item" data-page="new"><i>➕</i> Новая тема</div></div>
</div>

<div class="main-content">
    <div class="header">
        <div style="display:flex;align-items:center;gap:20px"><div class="menu-btn" id="menuBtn">☰</div><div class="page-title" id="pageTitle">Главная</div></div>
        <div class="profile-dropdown">
            <div class="profile-btn" id="profileBtn"><img id="profileAvatar" src="https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff"><span id="profileName">Гость</span><span>▼</span></div>
            <div class="dropdown-panel" id="profileDropdown">
                <div id="guestDropdown"><div class="menu-item" id="menuLogin">🔑 Войти</div><div class="menu-item" id="menuRegister">📝 Регистрация</div></div>
                <div id="userDropdown" style="display:none">
                    <div style="display:flex;align-items:center;gap:12px;padding:10px"><img id="dropdownAvatar" src="https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff" style="width:40px;height:40px;border-radius:50%"><div><strong id="dropdownName"></strong><span id="modBadgeDropdown" class="badge-moderator" style="display:none">🛡️</span><span id="adminBadgeDropdown" class="badge-admin" style="display:none">👑</span><br><span id="dropdownEmail" style="opacity:.7;font-size:.9rem"></span></div></div><hr>
                    <div class="menu-item" id="menuProfile">👤 Профиль</div><div class="menu-item" id="menuSettings">⚙️ Настройки</div><div class="menu-item" id="menuChangeAvatar">📷 Сменить аватар</div><hr><div class="menu-item" id="menuLogout">🚪 Выйти</div>
                </div>
            </div>
        </div>
    </div>
    <div id="pageContent"></div>
</div>

<!-- Модалки -->
<div class="modal" id="authModal"><div class="modal-card"><div class="modal-header"><h3>Вход</h3><span class="close-btn" id="closeAuthModal">&times;</span></div><div style="display:flex;gap:10px;margin-bottom:20px"><button class="submit-btn" id="loginTabBtn">LOGIN</button><button class="submit-btn" id="registerTabBtn" style="background:rgba(106,78,255,.2)">REGISTER</button></div><form id="loginForm"><div class="input-group"><input type="email" id="loginEmail" placeholder="Email"></div><div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div><button class="submit-btn">Войти</button></form><form id="registerForm" style="display:none"><div class="input-group"><input type="text" id="regUsername" placeholder="Имя"></div><div class="input-group"><input type="email" id="regEmail" placeholder="Email"></div><div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div><div class="input-group"><input type="password" id="regConfirm" placeholder="Подтверждение"></div><button class="submit-btn">Зарегистрироваться</button></form></div></div>
<div class="modal" id="newTopicModal"><div class="modal-card"><div class="modal-header"><h3>📝 Новая тема</h3><span class="close-btn" id="closeNewTopicModal">&times;</span></div><div class="input-group"><input type="text" id="topicTitle" placeholder="Заголовок"></div><div class="input-group"><textarea id="topicContent" placeholder="Текст" style="height:150px"></textarea></div><div class="file-upload-area" id="topicFileUpload" style="border:2px dashed rgba(106,78,255,0.3);border-radius:16px;padding:15px;text-align:center;margin-bottom:20px;cursor:pointer">📎 Прикрепить файлы</div><input type="file" id="topicFileInput" multiple style="display:none"><div id="filePreview"></div><button class="submit-btn" id="createTopicBtn">Опубликовать</button></div></div>
<div class="modal" id="viewTopicModal"><div class="modal-card"><div class="modal-header"><h3 id="viewTopicTitle"></h3><span class="close-btn" id="closeViewTopicModal">&times;</span></div><div id="viewTopicContent"></div><div id="commentsSection" style="margin:20px 0"></div><div class="input-group"><textarea id="commentInput" placeholder="Комментарий..."></textarea></div><button class="submit-btn" id="addCommentBtn">Отправить</button></div></div>
<div class="modal" id="settingsModal"><div class="modal-card"><div class="modal-header"><h3>⚙️ Настройки</h3><span class="close-btn" id="closeSettingsModal">&times;</span></div><div class="checkbox-group"><label><input type="checkbox" id="showOnline"> Показывать онлайн статус</label></div><div class="checkbox-group"><label><input type="checkbox" id="receiveEmails"> Получать новости</label></div><button class="submit-btn" id="saveSettingsBtn">Сохранить</button></div></div>
<div class="modal" id="editPostModal"><div class="modal-card"><div class="modal-header"><h3>✏️ Редактировать</h3><span class="close-btn" id="closeEditPostModal">&times;</span></div><div class="input-group"><input type="text" id="editPostTitle"></div><div class="input-group"><textarea id="editPostContent" style="height:150px"></textarea></div><button class="submit-btn" id="saveEditPostBtn">Сохранить</button></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, orderBy, limit, getDocs, updateDoc, deleteDoc, increment, collectionGroup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyDCaTAB8wBL-VyFXwo5UlBUwwb51LRb2a4",authDomain:"ambi-loader-site.firebaseapp.com",projectId:"ambi-loader-site",storageBucket:"ambi-loader-site.firebasestorage.app",messagingSenderId:"751272275051",appId:"1:751272275051:web:6f9976c1bc05f606a0d52e"};
const app=initializeApp(firebaseConfig); const auth=getAuth(app); const db=getFirestore(app);
const CLOUD_NAME="doptuvy8l", UPLOAD_PRESET="forum_preset";

let currentUser=null, currentPage='home', isAdmin=false, isModerator=false;
const profileBtn=document.getElementById('profileBtn'), profileDropdown=document.getElementById('profileDropdown'), guestDropdown=document.getElementById('guestDropdown'), userDropdown=document.getElementById('userDropdown');
const profileAvatar=document.getElementById('profileAvatar'), profileName=document.getElementById('profileName'), dropdownAvatar=document.getElementById('dropdownAvatar'), dropdownName=document.getElementById('dropdownName'), dropdownEmail=document.getElementById('dropdownEmail');
const modBadgeDropdown=document.getElementById('modBadgeDropdown'), adminBadgeDropdown=document.getElementById('adminBadgeDropdown');
const sideMenu=document.getElementById('sideMenu'), menuTrigger=document.getElementById('menuTrigger'), menuBtn=document.getElementById('menuBtn');
const modTab=document.getElementById('modTab'), adminTab=document.getElementById('adminTab');
const pageTitle=document.getElementById('pageTitle'), pageContent=document.getElementById('pageContent');

// Меню
function openMenu(){sideMenu.classList.add('active')} function closeMenu(){sideMenu.classList.remove('active')}
menuTrigger.addEventListener('mouseenter',openMenu); sideMenu.addEventListener('mouseleave',closeMenu); menuBtn.addEventListener('click',openMenu);

// Навигация
document.querySelectorAll('[data-page]').forEach(el=>el.addEventListener('click',()=>{
    const page=el.dataset.page; if(page==='new'){ openNewTopicModal(); closeMenu(); return; }
    if(page==='users'&&!isAdmin){ alert('Только админ'); return; }
    currentPage=page; renderPage(page); closeMenu();
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); el.classList.add('active');
}));
profileBtn.onclick=(e)=>{e.stopPropagation(); profileDropdown.classList.toggle('active');};
document.addEventListener('click',(e)=>{if(!profileBtn.contains(e.target)) profileDropdown.classList.remove('active');});
document.getElementById('menuProfile').onclick=()=>{currentPage='profile';renderPage('profile');profileDropdown.classList.remove('active');};
document.getElementById('menuSettings').onclick=()=>{document.getElementById('settingsModal').classList.add('active');profileDropdown.classList.remove('active');};
document.getElementById('menuLogout').onclick=async()=>{await signOut(auth);profileDropdown.classList.remove('active');};

// Загрузка пользователя
async function loadUserData(uid){
    const docRef=doc(db,'users',uid); const snap=await getDoc(docRef);
    if(snap.exists()){ const data=snap.data();
        if(data.avatarBase64){ profileAvatar.src=data.avatarBase64; dropdownAvatar.src=data.avatarBase64; }
        else{ const gen=`https://ui-avatars.com/api/?name=${encodeURIComponent(profileName.textContent)}&background=6a4eff&color=fff`; profileAvatar.src=gen; dropdownAvatar.src=gen; }
        isAdmin=(data.role==='admin'||uid==='apap5964-ai-uid');
        isModerator=(data.role==='moderator'||isAdmin);
        modTab.style.display=isModerator?'flex':'none'; adminTab.style.display=isAdmin?'flex':'none';
        modBadgeDropdown.style.display=isModerator?'inline-block':'none'; adminBadgeDropdown.style.display=isAdmin?'inline-block':'none';
    }
}
onAuthStateChanged(auth, async user=>{
    currentUser=user;
    if(user){
        const name=user.displayName||user.email.split('@')[0];
        profileName.textContent=name; dropdownName.textContent=name; dropdownEmail.textContent=user.email;
        guestDropdown.style.display='none'; userDropdown.style.display='block';
        await loadUserData(user.uid);
    }else{
        profileName.textContent='Гость'; profileAvatar.src=dropdownAvatar.src='https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff';
        guestDropdown.style.display='block'; userDropdown.style.display='none';
        isAdmin=isModerator=false; modTab.style.display=adminTab.style.display='none';
        modBadgeDropdown.style.display=adminBadgeDropdown.style.display='none';
    }
    renderPage(currentPage);
});

// Вход/Регистрация
const authModal=document.getElementById('authModal'), loginForm=document.getElementById('loginForm'), registerForm=document.getElementById('registerForm');
const loginTab=document.getElementById('loginTabBtn'), registerTab=document.getElementById('registerTabBtn');
loginTab.onclick=()=>{loginForm.style.display='block';registerForm.style.display='none';loginTab.style.background='linear-gradient(135deg,#6a4eff,#a855f7)';registerTab.style.background='rgba(106,78,255,.2)';};
registerTab.onclick=()=>{loginForm.style.display='none';registerForm.style.display='block';registerTab.style.background='linear-gradient(135deg,#6a4eff,#a855f7)';loginTab.style.background='rgba(106,78,255,.2)';};
document.getElementById('menuLogin').onclick=()=>{authModal.classList.add('active');loginTab.click();profileDropdown.classList.remove('active');};
document.getElementById('menuRegister').onclick=()=>{authModal.classList.add('active');registerTab.click();profileDropdown.classList.remove('active');};
document.getElementById('closeAuthModal').onclick=()=>authModal.classList.remove('active');
loginForm.onsubmit=async(e)=>{e.preventDefault(); try{await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);authModal.classList.remove('active');}catch(err){alert(err.message);}};
registerForm.onsubmit=async(e)=>{e.preventDefault(); if(regPassword.value!==regConfirm.value){alert('Пароли не совпадают');return;} try{const cred=await createUserWithEmailAndPassword(auth,regEmail.value,regPassword.value);await updateProfile(cred.user,{displayName:regUsername.value});await setDoc(doc(db,'users',cred.user.uid),{displayName:regUsername.value,email:regEmail.value,avatarBase64:''});authModal.classList.remove('active');}catch(err){alert(err.message);}};

// Смена аватарки
document.getElementById('menuChangeAvatar').onclick=()=>{ const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=async(e)=>{ const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=async(ev)=>{ const base64=ev.target.result; profileAvatar.src=base64; dropdownAvatar.src=base64; await setDoc(doc(db,'users',currentUser.uid),{avatarBase64:base64},{merge:true}); showToast('Аватар обновлён!'); }; reader.readAsDataURL(file); }; input.click(); };

// Рендер страниц
async function renderPage(page){
    pageTitle.textContent=page==='home'?'Главная':page==='profile'?'Профиль':page==='moderation'?'Модерация':page==='users'?'Пользователи':'Настройки';
    if(page==='home'){
        pageContent.innerHTML=`<div class="forum-grid"><div class="topics-area"><div class="section-header"><h2>🔥 Последние темы</h2><button class="submit-btn" style="width:auto;padding:10px 20px" id="createTopicInline">+ Новая тема</button></div><div id="topicsList"></div></div><div class="right-sidebar"><h3>❤️ Популярные</h3><div id="popularTopics"></div><h3>💬 Ответы</h3><div id="recentComments"></div></div></div>`;
        document.getElementById('createTopicInline').onclick=openNewTopicModal;
        loadTopics(); loadPopular(); loadRecentComments();
    }else if(page==='profile'){
        if(!currentUser){pageContent.innerHTML='<p>Войдите</p>';return;}
        const snap=await getDoc(doc(db,'users',currentUser.uid)); const data=snap.data()||{};
        const role=data.role; const badge=role==='admin'?'👑 Админ':(role==='moderator'?'🛡️ Модер':'');
        pageContent.innerHTML=`<div style="background:rgba(20,20,40,0.5);border-radius:24px;padding:30px"><div style="display:flex;gap:20px"><img src="${data.avatarBase64||'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName||currentUser.email)}" style="width:80px;height:80px;border-radius:50%"><div><h2>${currentUser.displayName||currentUser.email} ${badge}</h2><p>${currentUser.email}</p></div></div><h3>Ваши темы</h3><div id="userTopics"></div></div>`;
        loadUserTopics();
    }else if(page==='moderation'){
        if(!isModerator){pageContent.innerHTML='<p>Доступ запрещён</p>';return;}
        pageContent.innerHTML=`<h2>🛡️ Модерация</h2><div id="modTopicsList"></div>`;
        loadModTopics();
    }else if(page==='users'){
        if(!isAdmin){pageContent.innerHTML='<p>Только админ</p>';return;}
        pageContent.innerHTML=`<h2>👥 Пользователи</h2><div class="input-group"><input type="email" id="adminSearchEmail" placeholder="Email"></div><button class="submit-btn" id="adminSearchUserBtn">Найти</button><div id="adminSearchResult"></div>`;
        document.getElementById('adminSearchUserBtn').onclick=async()=>{
            const email=document.getElementById('adminSearchEmail').value;
            const q=query(collection(db,'users'),where('email','==',email)); const snap=await getDocs(q);
            if(snap.empty){ document.getElementById('adminSearchResult').innerHTML='<p>Не найден</p>'; return; }
            const doc=snap.docs[0]; const data=doc.data(); const uid=doc.id; const role=data.role||'user';
            document.getElementById('adminSearchResult').innerHTML=`<p>${data.displayName} (${email})<br>Роль: ${role}</p><button class="submit-btn" onclick="window.setUserRole('${uid}','moderator')">Сделать модером</button> <button class="submit-btn" onclick="window.setUserRole('${uid}','user')">Снять модера</button>`;
        };
    }
}
window.setUserRole=async(uid,role)=>{ await setDoc(doc(db,'users',uid),{role},{merge:true}); showToast('Роль обновлена'); if(currentPage==='users') renderPage('users'); };

// Темы
async function loadTopics(term=''){
    const container=document.getElementById('topicsList'); if(!container)return;
    let q=query(collection(db,'forum_posts'),orderBy('createdAt','desc'),limit(20));
    if(term) q=query(collection(db,'forum_posts'),where('title','>=',term),where('title','<=',term+'\uf8ff'),orderBy('title'),limit(20));
    const snap=await getDocs(q); let html='';
    snap.forEach(d=>{ const p=d.data(); html+=topicCard(d.id,p); });
    container.innerHTML=html||'<p>Нет тем</p>';
}
function topicCard(id,p){ return `<div class="topic-card" onclick="openTopic('${id}')"><div class="topic-title">${escapeHtml(p.title)} ${p.verified?'✅':''}</div><div class="topic-meta"><span>📅 ${p.createdAt?.toDate().toLocaleString()||''}</span><span>💬 ${p.commentCount||0}</span><span>❤️ ${p.likes||0}</span></div><div class="topic-author"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}"> ${escapeHtml(p.authorName)}</div></div>`; }
async function loadPopular(){ const container=document.getElementById('popularTopics'); const snap=await getDocs(query(collection(db,'forum_posts'),orderBy('likes','desc'),limit(5))); let html=''; snap.forEach(d=>{ const p=d.data(); html+=`<div class="recent-item" onclick="openTopic('${d.id}')"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}" style="width:24px;height:24px;border-radius:50%"><div><strong>${escapeHtml(p.title)}</strong><br><span>❤️ ${p.likes||0}</span></div></div>`; }); container.innerHTML=html||'<p>Нет</p>'; }
async function loadRecentComments(){ const container=document.getElementById('recentComments'); const snap=await getDocs(query(collectionGroup(db,'comments'),orderBy('createdAt','desc'),limit(5))); let html=''; snap.forEach(d=>{ const c=d.data(); html+=`<div class="recent-item"><div><strong>${c.authorName}</strong><br>${c.text.substring(0,30)}...</div></div>`; }); container.innerHTML=html||'<p>Нет</p>'; }
async function loadUserTopics(){ const snap=await getDocs(query(collection(db,'forum_posts'),where('authorId','==',currentUser.uid),orderBy('createdAt','desc'))); let html=''; snap.forEach(d=>{ html+=topicCard(d.id,d.data()); }); document.getElementById('userTopics').innerHTML=html||'<p>У вас нет тем</p>'; }
async function loadModTopics(){ const snap=await getDocs(query(collection(db,'forum_posts'),orderBy('createdAt','desc'))); let html=''; snap.forEach(d=>{ const p=d.data(); html+=`<div class="topic-card"><div class="topic-title">${p.title}</div><button onclick="deletePost('${d.id}')">🗑️</button> <button onclick="editPost('${d.id}')">✏️</button> <button onclick="toggleVerified('${d.id}',${!p.verified})">${p.verified?'✅':'⬜'}</button></div>`; }); document.getElementById('modTopicsList').innerHTML=html; }

// Множественная загрузка
let uploadedFiles=[];
function openNewTopicModal(){ document.getElementById('newTopicModal').classList.add('active'); uploadedFiles=[]; updateFilePreview(); }
document.getElementById('closeNewTopicModal').onclick=()=>document.getElementById('newTopicModal').classList.remove('active');
document.getElementById('topicFileUpload').onclick=()=>document.getElementById('topicFileInput').click();
document.getElementById('topicFileInput').onchange=async(e)=>{
    const files=Array.from(e.target.files);
    for(const file of files){
        const fd=new FormData(); fd.append('file',file); fd.append('upload_preset',UPLOAD_PRESET);
        const endpoint=file.type.startsWith('image/')?`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`:`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`;
        const res=await fetch(endpoint,{method:'POST',body:fd}); const data=await res.json();
        uploadedFiles.push({url:data.secure_url,name:file.name,type:file.type,size:file.size});
    }
    updateFilePreview();
};
function updateFilePreview(){ const prev=document.getElementById('filePreview'); let html=''; uploadedFiles.forEach((f,i)=>{ if(f.type.startsWith('image/')) html+=`<div><img src="${f.url}" style="max-width:100px;max-height:100px"> ${f.name} <button onclick="removeFile(${i})">❌</button></div>`; else html+=`<div>📄 ${f.name} <button onclick="removeFile(${i})">❌</button></div>`; }); prev.innerHTML=html; }
window.removeFile=(i)=>{ uploadedFiles.splice(i,1); updateFilePreview(); };
document.getElementById('createTopicBtn').onclick=async()=>{
    if(!currentUser){alert('Войдите');return;}
    const title=document.getElementById('topicTitle').value.trim(); const content=document.getElementById('topicContent').value.trim();
    if(!title||!content){alert('Заполните');return;}
    const userSnap=await getDoc(doc(db,'users',currentUser.uid)); const userData=userSnap.data()||{};
    await setDoc(doc(collection(db,'forum_posts')),{title,content,files:uploadedFiles,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,authorAvatar:userData.avatarBase64||'',authorRole:userData.role||'user',createdAt:new Date(),likes:0,commentCount:0,verified:false});
    document.getElementById('newTopicModal').classList.remove('active'); uploadedFiles=[]; updateFilePreview(); document.getElementById('topicTitle').value=document.getElementById('topicContent').value='';
    if(currentPage==='home') loadTopics(); showToast('Тема создана!');
};

// Открытие темы
window.openTopic=async(postId)=>{
    const postRef=doc(db,'forum_posts',postId); const postSnap=await getDoc(postRef); const post=postSnap.data();
    const modal=document.getElementById('viewTopicModal'); document.getElementById('viewTopicTitle').textContent=post.title;
    let html=`<div style="display:flex;gap:15px;margin-bottom:15px"><img src="${post.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(post.authorName)}" style="width:40px;height:40px;border-radius:50%"><div><strong>${escapeHtml(post.authorName)} ${post.authorRole==='admin'?'<span class="badge-admin">👑</span>':post.authorRole==='moderator'?'<span class="badge-moderator">🛡️</span>':''}</strong><br>${post.createdAt?.toDate().toLocaleString()}</div></div><div>${escapeHtml(post.content)}</div>`;
    if(post.files&&post.files.length){ html+='<div style="margin-top:20px"><h4>📎 Вложения:</h4>'; post.files.forEach(f=>{ if(f.type.startsWith('image/')) html+=`<img src="${f.url}" style="max-width:100%;border-radius:12px;margin:5px 0">`; else html+=`<div><a href="${f.url}" target="_blank">${f.name}</a></div>`; }); html+='</div>'; }
    document.getElementById('viewTopicContent').innerHTML=html;
    // Лайк
    const likeRef=doc(db,'forum_posts',postId,'likes',currentUser?.uid||'guest'); const likeSnap=await getDoc(likeRef); const liked=likeSnap.exists();
    const likeBtn=document.createElement('button'); likeBtn.className='submit-btn'; likeBtn.style.width='auto'; likeBtn.style.marginTop='15px'; likeBtn.textContent=`❤️ ${post.likes||0}`; likeBtn.onclick=async()=>{ if(!currentUser)return alert('Войдите'); if(liked){ await deleteDoc(likeRef); await updateDoc(postRef,{likes:increment(-1)}); }else{ await setDoc(likeRef,{userId:currentUser.uid}); await updateDoc(postRef,{likes:increment(1)}); } openTopic(postId); }; document.getElementById('viewTopicContent').append(likeBtn);
    // Комментарии
    const commSnap=await getDocs(query(collection(db,'forum_posts',postId,'comments'),orderBy('createdAt'))); let commHtml='';
    for(const c of commSnap.docs){ const d=c.data(); const userDoc=await getDoc(doc(db,'users',d.authorId)); const userData=userDoc.data()||{}; const avatar=userData.avatarBase64||`https://ui-avatars.com/api/?name=${encodeURIComponent(d.authorName)}&background=6a4eff&color=fff`; commHtml+=`<div style="display:flex;gap:10px;margin-bottom:15px"><img src="${avatar}" class="comment-avatar"><div><strong>${d.authorName}</strong><br>${d.text}</div></div>`; }
    document.getElementById('commentsSection').innerHTML=commHtml;
    modal.classList.add('active');
    document.getElementById('addCommentBtn').onclick=async()=>{ if(!currentUser)return alert('Войдите'); const text=document.getElementById('commentInput').value.trim(); if(!text)return; const userSnap=await getDoc(doc(db,'users',currentUser.uid)); const userData=userSnap.data()||{}; await setDoc(doc(collection(db,'forum_posts',postId,'comments')),{text,authorId:currentUser.uid,authorName:currentUser.displayName||currentUser.email,authorAvatar:userData.avatarBase64||'',createdAt:new Date()}); await updateDoc(postRef,{commentCount:increment(1)}); openTopic(postId); };
};
document.getElementById('closeViewTopicModal').onclick=()=>document.getElementById('viewTopicModal').classList.remove('active');
document.getElementById('viewTopicModal').addEventListener('click',(e)=>{if(e.target===document.getElementById('viewTopicModal')) document.getElementById('viewTopicModal').classList.remove('active');});

// Модерация
window.deletePost=async(id)=>{ if(confirm('Удалить?')){ await deleteDoc(doc(db,'forum_posts',id)); loadModTopics(); } };
window.editPost=async(id)=>{ const snap=await getDoc(doc(db,'forum_posts',id)); const p=snap.data(); document.getElementById('editPostTitle').value=p.title; document.getElementById('editPostContent').value=p.content; document.getElementById('editPostModal').classList.add('active'); document.getElementById('saveEditPostBtn').onclick=async()=>{ await updateDoc(doc(db,'forum_posts',id),{title:document.getElementById('editPostTitle').value,content:document.getElementById('editPostContent').value}); document.getElementById('editPostModal').classList.remove('active'); loadModTopics(); }; };
window.toggleVerified=async(id,val)=>{ await updateDoc(doc(db,'forum_posts',id),{verified:val}); loadModTopics(); };
document.getElementById('closeEditPostModal').onclick=()=>document.getElementById('editPostModal').classList.remove('active');

// Поиск
document.getElementById('searchInput').addEventListener('input',e=>{ if(currentPage==='home') loadTopics(e.target.value); });

// Настройки
document.getElementById('saveSettingsBtn').onclick=async()=>{ if(!currentUser)return; const settings={showOnline:document.getElementById('showOnline').checked,receiveEmails:document.getElementById('receiveEmails').checked}; await setDoc(doc(db,'users',currentUser.uid),{settings},{merge:true}); showToast('Сохранено'); document.getElementById('settingsModal').classList.remove('active'); };
document.getElementById('closeSettingsModal').onclick=()=>document.getElementById('settingsModal').classList.remove('active');

function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function escapeHtml(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

// Инициализация
renderPage('home');
</script>
</body>
</html>
