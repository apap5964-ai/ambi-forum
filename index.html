<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBI FORUM — Сообщество</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: #fff; min-height: 100vh; }
        ::-webkit-scrollbar { width: 0; background: transparent; }

        /* Выдвижное левое меню */
        .side-menu { position: fixed; left: 0; top: 0; height: 100vh; width: 300px; background: rgba(10,10,20,0.95); backdrop-filter: blur(15px); border-right: 1px solid rgba(106,78,255,0.3); transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); z-index: 1000; padding: 30px 20px; overflow-y: auto; box-shadow: 5px 0 30px rgba(0,0,0,0.5); }
        .side-menu.active { transform: translateX(0); }
        .menu-trigger { position: fixed; left: 0; top: 0; width: 20px; height: 100vh; z-index: 999; }
        .logo { font-size: 2rem; font-weight: 900; background: linear-gradient(135deg, #6a4eff, #a855f7, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 30px; text-align: center; }
        .nav-item { padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); }
        .nav-item:hover, .nav-item.active { background: rgba(106,78,255,0.15); color: white; border-left: 3px solid #6a4eff; }
        .nav-section { margin-top: 25px; }
        .nav-section-title { font-size: 0.8rem; text-transform: uppercase; opacity: 0.5; margin-bottom: 10px; padding-left: 18px; }
        .search-box { margin: 20px 0; }
        .search-box input { width: 100%; padding: 14px 18px; background: rgba(20,20,40,0.8); border: 1px solid rgba(106,78,255,0.4); border-radius: 40px; color: white; outline: none; }
        .search-box input:focus { border-color: #a855f7; box-shadow: 0 0 15px rgba(106,78,255,0.3); }

        /* Основной контент */
        .main-content { padding: 25px 30px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #fff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .menu-btn { background: rgba(20,20,35,0.8); backdrop-filter: blur(5px); border: 1px solid rgba(106,78,255,0.3); padding: 12px 20px; border-radius: 40px; cursor: pointer; font-size: 1.5rem; }
        
        .profile-dropdown { position: relative; }
        .profile-btn { display: flex; align-items: center; gap: 12px; background: rgba(20,20,35,0.8); backdrop-filter: blur(5px); border: 1px solid rgba(106,78,255,0.3); padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .profile-btn:hover { border-color: #6a4eff; box-shadow: 0 0 15px rgba(106,78,255,0.3); }
        .profile-btn img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #6a4eff; }
        .profile-btn span { font-weight: 600; }
        .dropdown-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 260px; background: rgba(10,10,20,0.95); backdrop-filter: blur(15px); border-radius: 20px; padding: 15px; border: 1px solid rgba(106,78,255,0.3); display: none; opacity: 0; transform: scale(0.9) translateY(-10px); transition: all 0.2s; z-index: 100; }
        .dropdown-panel.active { display: block; opacity: 1; transform: scale(1) translateY(0); }
        .dropdown-panel .menu-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .dropdown-panel .menu-item:hover { background: rgba(106,78,255,0.2); }
        .dropdown-panel hr { margin: 10px 0; border-color: rgba(106,78,255,0.2); }

        /* Карточки тем */
        .forum-grid { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        .topics-area { background: rgba(20,20,40,0.5); backdrop-filter: blur(5px); border-radius: 24px; padding: 20px; border: 1px solid rgba(106,78,255,0.2); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .topic-card { background: rgba(10,10,20,0.6); border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(106,78,255,0.2); transition: 0.2s; cursor: pointer; }
        .topic-card:hover { border-color: #6a4eff; transform: translateY(-2px); }
        .topic-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; color: #a855f7; }
        .topic-meta { display: flex; gap: 20px; font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px; flex-wrap: wrap; }
        .topic-author { display: flex; align-items: center; gap: 8px; }
        .topic-author img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #6a4eff; }
        .like-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px; transition: 0.2s; }
        .like-btn:hover { background: rgba(106,78,255,0.2); }
        .like-btn.liked { color: #ff6b9d; }

        .right-sidebar { background: rgba(20,20,40,0.3); backdrop-filter: blur(5px); border-radius: 20px; padding: 20px; border: 1px solid rgba(106,78,255,0.2); height: fit-content; }
        .right-sidebar h3 { margin-bottom: 15px; color: #a855f7; }
        .recent-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(106,78,255,0.1); cursor: pointer; }
        .recent-item:last-child { border: none; }
        .recent-item img { width: 24px; height: 24px; border-radius: 50%; }

        /* Модальные окна */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1001; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-card { background: rgba(20,20,40,0.9); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { font-size: 24px; cursor: pointer; }

        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group textarea { width: 100%; padding: 14px; background: rgba(10,10,20,0.6); border: 1px solid rgba(106,78,255,0.3); border-radius: 16px; color: white; outline: none; }
        .input-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
        .submit-btn { background: linear-gradient(135deg, #6a4eff, #a855f7); padding: 14px; border: none; border-radius: 30px; color: white; font-weight: 700; width: 100%; cursor: pointer; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #6a4eff, #a855f7); padding: 10px 20px; border-radius: 50px; z-index: 9999; animation: toastFade 2s ease-out; }
        @keyframes toastFade { 0%{opacity:0;transform:translateX(-50%) translateY(20px);}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-20px);} }
        @media (max-width: 768px) { .forum-grid { grid-template-columns: 1fr; } .main-content { padding: 15px; } }
    </style>
</head>
<body>
<!-- Выдвижное левое меню -->
<div class="menu-trigger" id="menuTrigger"></div>
<div class="side-menu" id="sideMenu">
    <div class="logo">💬 AMBI</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Поиск тем...">
    </div>
    <div class="nav-item active" data-page="home"><i>🏠</i> Главная</div>
    <div class="nav-item" data-page="profile"><i>👤</i> Профиль</div>
    <div class="nav-item" data-page="settings"><i>⚙️</i> Настройки</div>
    <div class="nav-section">
        <div class="nav-section-title">Сообщество</div>
        <div class="nav-item" data-page="new"><i>➕</i> Новая тема</div>
    </div>
</div>

<!-- Основной контент -->
<div class="main-content">
    <div class="header">
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="menu-btn" id="menuBtn">☰</div>
            <div class="page-title" id="pageTitle">Главная</div>
        </div>
        <div class="profile-dropdown">
            <div class="profile-btn" id="profileBtn">
                <img id="profileAvatar" src="https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff">
                <span id="profileName">Гость</span>
                <span>▼</span>
            </div>
            <div class="dropdown-panel" id="profileDropdown">
                <div id="guestDropdown" style="display: none;">
                    <div class="menu-item" id="menuLogin">🔑 Войти</div>
                    <div class="menu-item" id="menuRegister">📝 Регистрация</div>
                </div>
                <div id="userDropdown" style="display: none;">
                    <div style="display: flex; align-items: center; gap: 12px; padding: 10px;">
                        <img id="dropdownAvatar" src="https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #6a4eff;">
                        <div><strong id="dropdownName"></strong><br><span id="dropdownEmail" style="opacity:0.7; font-size:0.9rem;"></span></div>
                    </div>
                    <hr>
                    <div class="menu-item" id="menuProfile">👤 Профиль</div>
                    <div class="menu-item" id="menuSettings">⚙️ Настройки</div>
                    <div class="menu-item" id="menuChangeAvatar">📷 Сменить аватар</div>
                    <hr>
                    <div class="menu-item" id="menuLogout">🚪 Выйти</div>
                </div>
            </div>
        </div>
    </div>

    <div id="pageContent"></div>
</div>

<!-- Модальные окна (без изменений) -->
<div class="modal" id="authModal">
    <div class="modal-card" style="max-width: 400px;">
        <div class="modal-header"><h3 id="authTitle">Вход</h3><span class="close-btn" id="closeAuthModal">&times;</span></div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="submit-btn" id="loginTabBtn" style="flex:1;">LOGIN</button>
            <button class="submit-btn" id="registerTabBtn" style="flex:1; background: rgba(106,78,255,0.2);">REGISTER</button>
        </div>
        <form id="loginForm">
            <div class="input-group"><input type="email" id="loginEmail" placeholder="Email" required></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль" required></div>
            <button type="submit" class="submit-btn">Войти</button>
        </form>
        <form id="registerForm" style="display: none;">
            <div class="input-group"><input type="text" id="regUsername" placeholder="Имя" required></div>
            <div class="input-group"><input type="email" id="regEmail" placeholder="Email" required></div>
            <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль" required></div>
            <div class="input-group"><input type="password" id="regConfirm" placeholder="Подтверждение" required></div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>

<div class="modal" id="newTopicModal">
    <div class="modal-card">
        <div class="modal-header"><h3>📝 Новая тема</h3><span class="close-btn" id="closeNewTopicModal">&times;</span></div>
        <div class="input-group"><input type="text" id="topicTitle" placeholder="Заголовок"></div>
        <div class="input-group"><textarea id="topicContent" placeholder="Текст" style="height:150px;"></textarea></div>
        <div class="file-upload-area" id="topicFileUpload" style="border:2px dashed rgba(106,78,255,0.3); border-radius:16px; padding:15px; text-align:center; margin-bottom:20px; cursor:pointer;">📎 Прикрепить картинку</div>
        <input type="file" id="topicFileInput" accept="image/*" style="display:none;">
        <img id="topicImagePreview" style="max-width:100%; max-height:200px; border-radius:12px; margin-bottom:15px; display:none;">
        <button class="submit-btn" id="createTopicBtn">Опубликовать</button>
    </div>
</div>

<div class="modal" id="viewTopicModal">
    <div class="modal-card" style="max-width:700px;">
        <div class="modal-header"><h3 id="viewTopicTitle"></h3><span class="close-btn" id="closeViewTopicModal">&times;</span></div>
        <div id="viewTopicContent"></div>
        <div id="commentsSection" style="margin:20px 0;"></div>
        <div class="input-group"><textarea id="commentInput" placeholder="Комментарий..."></textarea></div>
        <button class="submit-btn" id="addCommentBtn">Отправить</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-card">
        <div class="modal-header"><h3>⚙️ Настройки</h3><span class="close-btn" id="closeSettingsModal">&times;</span></div>
        <div class="checkbox-group"><label><input type="checkbox" id="showOnline"> Показывать онлайн статус</label></div>
        <div class="checkbox-group"><label><input type="checkbox" id="receiveEmails"> Получать новости на email</label></div>
        <button class="submit-btn" id="saveSettingsBtn">Сохранить</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDCaTAB8wBL-VyFXwo5UlBUwwb51LRb2a4",
        authDomain: "ambi-loader-site.firebaseapp.com",
        projectId: "ambi-loader-site",
        storageBucket: "ambi-loader-site.firebasestorage.app",
        messagingSenderId: "751272275051",
        appId: "1:751272275051:web:6f9976c1bc05f606a0d52e"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const CLOUD_NAME = "doptuvy8l";
    const UPLOAD_PRESET = "forum_preset";

    let currentUser = null, currentPostId = null, currentPage = 'home', userSettings = { showOnline: true, receiveEmails: false };
    const profileBtn = document.getElementById('profileBtn'), profileDropdown = document.getElementById('profileDropdown'), guestDropdown = document.getElementById('guestDropdown'), userDropdown = document.getElementById('userDropdown');
    const profileAvatar = document.getElementById('profileAvatar'), profileName = document.getElementById('profileName'), dropdownAvatar = document.getElementById('dropdownAvatar'), dropdownName = document.getElementById('dropdownName'), dropdownEmail = document.getElementById('dropdownEmail');
    const pageTitle = document.getElementById('pageTitle'), pageContent = document.getElementById('pageContent'), authModal = document.getElementById('authModal');
    const sideMenu = document.getElementById('sideMenu'), menuTrigger = document.getElementById('menuTrigger'), menuBtn = document.getElementById('menuBtn');

    // Выдвижное меню
    function openMenu() { sideMenu.classList.add('active'); }
    function closeMenu() { sideMenu.classList.remove('active'); }
    menuTrigger.addEventListener('mouseenter', openMenu);
    sideMenu.addEventListener('mouseleave', closeMenu);
    menuBtn.addEventListener('click', openMenu);

    // Кеширование аватарок
    async function loadUserData(uid) {
        const cached = localStorage.getItem(`avatar_${uid}`);
        if (cached) { profileAvatar.src = cached; dropdownAvatar.src = cached; }
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            if (data.avatarBase64) {
                profileAvatar.src = data.avatarBase64; dropdownAvatar.src = data.avatarBase64;
                localStorage.setItem(`avatar_${uid}`, data.avatarBase64);
            } else if (!cached) {
                const gen = `https://ui-avatars.com/api/?name=${encodeURIComponent(profileName.textContent)}&background=6a4eff&color=fff`;
                profileAvatar.src = gen; dropdownAvatar.src = gen;
            }
            if (data.settings) userSettings = data.settings;
        }
    }

    // Навигация
    document.querySelectorAll('[data-page]').forEach(el => el.addEventListener('click', () => {
        const page = el.dataset.page;
        if (page === 'new') { if (!currentUser) { alert('Войдите'); return; } document.getElementById('newTopicModal').classList.add('active'); closeMenu(); return; }
        currentPage = page; renderPage(page); closeMenu();
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
    }));

    profileBtn.onclick = (e) => { e.stopPropagation(); profileDropdown.classList.toggle('active'); };
    document.addEventListener('click', (e) => { if (!profileBtn.contains(e.target)) profileDropdown.classList.remove('active'); });

    document.getElementById('menuProfile').onclick = () => { currentPage = 'profile'; renderPage('profile'); profileDropdown.classList.remove('active'); };
    document.getElementById('menuSettings').onclick = () => { document.getElementById('settingsModal').classList.add('active'); profileDropdown.classList.remove('active'); };
    document.getElementById('menuLogout').onclick = async () => { await auth.signOut(); profileDropdown.classList.remove('active'); };

    auth.onAuthStateChanged(async user => {
        currentUser = user;
        if (user) {
            const name = user.displayName || user.email.split('@')[0];
            profileName.textContent = name; dropdownName.textContent = name; dropdownEmail.textContent = user.email;
            guestDropdown.style.display = 'none'; userDropdown.style.display = 'block';
            await loadUserData(user.uid);
        } else {
            profileName.textContent = 'Гость'; profileAvatar.src = 'https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff';
            dropdownAvatar.src = 'https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff';
            guestDropdown.style.display = 'block'; userDropdown.style.display = 'none';
        }
        renderPage(currentPage);
    });

    // Вход/регистрация
    document.getElementById('menuLogin').onclick = () => { authModal.classList.add('active'); profileDropdown.classList.remove('active'); };
    document.getElementById('menuRegister').onclick = () => { authModal.classList.add('active'); document.getElementById('registerTabBtn').click(); profileDropdown.classList.remove('active'); };
    document.getElementById('closeAuthModal').onclick = () => authModal.classList.remove('active');
    document.getElementById('loginTabBtn').onclick = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; };
    document.getElementById('registerTabBtn').onclick = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; };
    document.getElementById('loginForm').onsubmit = async (e) => { e.preventDefault(); try { await auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value); authModal.classList.remove('active'); } catch(err) { alert(err.message); } };
    document.getElementById('registerForm').onsubmit = async (e) => { e.preventDefault(); if (regPassword.value !== regConfirm.value) { alert('Пароли не совпадают'); return; } try { const cred = await auth.createUserWithEmailAndPassword(regEmail.value, regPassword.value); await cred.user.updateProfile({ displayName: regUsername.value }); await db.collection('users').doc(cred.user.uid).set({ displayName: regUsername.value, email: regEmail.value, avatarBase64: '', settings: { showOnline: true, receiveEmails: false } }, { merge: true }); authModal.classList.remove('active'); } catch(err) { alert(err.message); } };

    // Смена аватарки с кешированием
    const hiddenAvatarInput = document.createElement('input'); hiddenAvatarInput.type = 'file'; hiddenAvatarInput.accept = 'image/*';
    hiddenAvatarInput.onchange = async (e) => {
        const file = e.target.files[0]; if (!file || !currentUser) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const base64 = ev.target.result;
            profileAvatar.src = base64; dropdownAvatar.src = base64;
            localStorage.setItem(`avatar_${currentUser.uid}`, base64);
            await db.collection('users').doc(currentUser.uid).set({ avatarBase64: base64 }, { merge: true });
            showToast('Аватар обновлён!');
        };
        reader.readAsDataURL(file);
    };
    document.getElementById('menuChangeAvatar').onclick = () => hiddenAvatarInput.click();

    // Рендер страниц (главная, профиль, поиск)
    async function renderPage(page) {
        pageTitle.textContent = page === 'home' ? 'Главная' : page === 'profile' ? 'Профиль' : 'Настройки';
        if (page === 'home') {
            pageContent.innerHTML = `
                <div class="forum-grid">
                    <div class="topics-area">
                        <div class="section-header"><h2>🔥 Последние темы</h2><button class="submit-btn" style="width:auto; padding:10px 20px;" id="createTopicInline">+ Новая тема</button></div>
                        <div id="topicsList"></div>
                    </div>
                    <div class="right-sidebar">
                        <h3>❤️ Популярные темы</h3>
                        <div id="popularTopics"></div>
                        <h3 style="margin-top:25px;">💬 Последние ответы</h3>
                        <div id="recentComments"></div>
                    </div>
                </div>
            `;
            document.getElementById('createTopicInline').onclick = () => { if (!currentUser) { alert('Войдите'); return; } document.getElementById('newTopicModal').classList.add('active'); };
            loadTopics(); loadPopularTopics(); loadRecentComments();
        } else if (page === 'profile') {
            if (!currentUser) { pageContent.innerHTML = '<p>Войдите для просмотра</p>'; return; }
            const doc = await db.collection('users').doc(currentUser.uid).get(); const data = doc.data() || {};
            pageContent.innerHTML = `<div style="background:rgba(20,20,40,0.5); border-radius:24px; padding:30px;">
                <div style="display:flex; align-items:center; gap:20px;"><img src="${data.avatarBase64 || 'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName||currentUser.email)}" style="width:80px; height:80px; border-radius:50%; border:3px solid #6a4eff;">
                <div><h2>${currentUser.displayName || currentUser.email}</h2><p>${currentUser.email}</p></div></div>
                <h3>Ваши темы</h3><div id="userTopics"></div></div>`;
            loadUserTopics();
        }
    }

    async function loadTopics(searchTerm = '') {
        const container = document.getElementById('topicsList'); if (!container) return;
        let query = db.collection('forum_posts').orderBy('createdAt','desc');
        if (searchTerm) query = query.where('title', '>=', searchTerm).where('title', '<=', searchTerm+'\uf8ff');
        const snap = await query.limit(20).get(); let html = '';
        snap.forEach(doc => { const p = doc.data(); html += topicCard(doc.id, p); });
        container.innerHTML = html || '<p>Темы не найдены</p>';
    }

    async function loadPopularTopics() {
        const container = document.getElementById('popularTopics'); if (!container) return;
        const snap = await db.collection('forum_posts').orderBy('likes','desc').limit(5).get(); let html = '';
        snap.forEach(doc => { const p = doc.data(); html += `<div class="recent-item" onclick="openTopic('${doc.id}')"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}"><div><strong>${escapeHtml(p.title)}</strong><br><span style="opacity:0.7;">❤️ ${p.likes||0}</span></div></div>`; });
        container.innerHTML = html || '<p>Нет тем</p>';
    }

    async function loadRecentComments() { document.getElementById('recentComments').innerHTML = '<p>Загрузка...</p>'; }
    async function loadUserTopics() {
        const snap = await db.collection('forum_posts').where('authorId','==',currentUser.uid).orderBy('createdAt','desc').get(); let html = '';
        snap.forEach(doc => { const p = doc.data(); html += topicCard(doc.id, p); });
        document.getElementById('userTopics').innerHTML = html || '<p>У вас нет тем</p>';
    }

    function topicCard(id, p) {
        return `<div class="topic-card" onclick="openTopic('${id}')">
            <div class="topic-title">${escapeHtml(p.title)}</div>
            <div class="topic-meta"><span>📅 ${p.createdAt?.toDate().toLocaleString()||''}</span><span>💬 ${p.commentCount||0}</span><span>❤️ ${p.likes||0}</span></div>
            <div class="topic-author"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}"> ${escapeHtml(p.authorName)}</div>
        </div>`;
    }

    window.openTopic = async (postId) => { /* ... полный код openTopic ... */ };
    // (Остальной код openTopic, createTopic, likeTopic и т.д. остаётся без изменений, я не стал дублировать для экономии места, но в твоём файле он должен быть)
    
    // Поиск
    document.getElementById('searchInput').addEventListener('input', (e) => { if (currentPage === 'home') loadTopics(e.target.value); });

    function showToast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    // Инициализация
    document.getElementById('closeNewTopicModal').onclick = () => document.getElementById('newTopicModal').classList.remove('active');
    document.getElementById('closeSettingsModal').onclick = () => document.getElementById('settingsModal').classList.remove('active');
    renderPage('home');
</script>
</body>
</html>
