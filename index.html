registerForm.onsubmit = async (e) => {
  e.preventDefault();
  if (regPassword.value !== regConfirm.value) {
    alert('Пароли не совпадают');

  }
  try {

    await new Promise(resolve => setTimeout(resolve, 500));

      displayName: regUsername.value,
      email: regEmail.value,
      avatarBase64: '',

      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

// загрузка пользователя (с кэшированием кастомизации)
async function loadUserData(uid){
    const docRef=db.collection('users').doc(uid); const snap=await docRef.get();
    if(snap.exists){ const data=snap.data();
        if(data.avatarBase64){ profileAvatar.src=data.avatarBase64; dropdownAvatar.src=data.avatarBase64; }
        else{ const gen=`https://ui-avatars.com/api/?name=${encodeURIComponent(profileName.textContent)}&background=6a4eff&color=fff`; profileAvatar.src=gen; dropdownAvatar.src=gen; }
        isAdmin=(data.role==='admin'||uid===ADMIN_UID); isModerator=(data.role==='moderator'||isAdmin);
        modTab.style.display=isModerator?'flex':'none'; adminTab.style.display=isAdmin?'flex':'none';
        modBadgeDropdown.style.display=isModerator?'inline-block':'none'; adminBadgeDropdown.style.display=isAdmin?'inline-block':'none';
        if(data.settings?.showOnline!==false) onlineUsers.add(uid);
        if(data.customization) localStorage.setItem(`custom_${uid}`, JSON.stringify(data.customization));
    }else if(uid===ADMIN_UID){ isAdmin=true; isModerator=true; modTab.style.display='flex'; adminTab.style.display='flex'; modBadgeDropdown.style.display='inline-block'; adminBadgeDropdown.style.display='inline-block'; onlineUsers.add(uid); }
}

function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function getUserAvatar(data) { return data?.avatarBase64 || `https://ui-avatars.com/api/?name=${encodeURIComponent(data?.displayName || 'User')}&background=6a4eff&color=fff`; }
function getFrameClass(role, achievements, customFrame) {
    if (customFrame) return customFrame;
    if (role === 'admin') return 'frame-admin';
    if (role === 'moderator') return 'frame-moderator';
    if (achievements?.includes('verified_5')) return 'frame-gold';
    if (achievements?.includes('verified_10')) return 'frame-diamond';
    return '';
}

// кастомизация профиля
async function openCustomizeModal() {
    if (!currentUser) return alert('Войдите');
    const snap = await db.collection('users').doc(currentUser.uid).get();
    const data = snap.data() || {};
    const customization = data.customization || {};
    document.getElementById('nickColor').value = customization.nickColor || 'default';
    document.getElementById('nickGlow').value = customization.nickGlow || 'none';
    const hasGold = data.achievements?.includes('verified_5');
    const hasDiamond = data.achievements?.includes('verified_10');
    document.getElementById('optGold').disabled = !hasGold;
    document.getElementById('optDiamond').disabled = !hasDiamond;
    document.getElementById('avatarFrameSelect').value = customization.avatarFrame || 'none';
    document.getElementById('customizeModal').classList.add('active');
}
document.getElementById('saveCustomizeBtn').onclick = async () => {
    if (!currentUser) return;
    const file = document.getElementById('profileBgInput').files[0];
    const miniFile = document.getElementById('profileMiniBgInput').files[0];
    let profileBg = null, profileMiniBg = null;
    if (file) profileBg = await new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(file); });
    if (miniFile) profileMiniBg = await new Promise(resolve => { const r = new FileReader(); r.onload = e => resolve(e.target.result); r.readAsDataURL(miniFile); });
    
    const customization = {};
    const nickColor = document.getElementById('nickColor').value;
    if (nickColor !== 'default') customization.nickColor = nickColor;
    const nickGlow = document.getElementById('nickGlow').value;
    if (nickGlow !== 'none') customization.nickGlow = nickGlow;
    const avatarFrame = document.getElementById('avatarFrameSelect').value;
    if (avatarFrame !== 'none') customization.avatarFrame = avatarFrame;
    if (profileBg) customization.profileBg = profileBg;
    if (profileMiniBg) customization.profileMiniBg = profileMiniBg;
    Object.keys(customization).forEach(k => customization[k] === undefined && delete customization[k]);
    
    await db.collection('users').doc(currentUser.uid).set({ customization }, { merge: true });
    localStorage.setItem(`custom_${currentUser.uid}`, JSON.stringify(customization));
    document.getElementById('customizeModal').classList.remove('active');
    showToast('Кастомизация сохранена!');
    if (currentPage === 'profile') renderPage('profile');
};
document.getElementById('closeCustomizeModal').onclick = () => document.getElementById('customizeModal').classList.remove('active');

function applyNickStyle(element, customization) {
    if (!customization) return;
    if (customization.nickColor === 'rainbow') element.style.background = 'linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet)';
    else if (customization.nickColor === 'gold') element.style.color = '#FFD700';
    else if (customization.nickColor === 'purple') element.style.color = '#a855f7';
    else element.style.color = '';
    if (customization.nickGlow === 'small') element.style.textShadow = '0 0 5px currentColor';
    else if (customization.nickGlow === 'strong') element.style.textShadow = '0 0 15px currentColor';
    else element.style.textShadow = '';
}

// рендер страниц

        pageContent.innerHTML = `<div class="forum-grid"><div class="topics-area"><div class="section-header"><h2>🔥 Последние темы</h2><button class="submit-btn" style="width:auto;padding:10px 20px" id="createTopicInline">+ Новая тема</button></div><div id="topicsList"></div></div><div class="right-sidebar"><h3>❤️ Популярные</h3><div id="popularTopics"></div><h3>💬 Последние ответы</h3><div id="recentComments"></div></div></div>`;

    } else if (page === 'profile') {
        if (!currentUser) { pageContent.innerHTML = '<p>Войдите</p>'; return; }
        const uid = currentProfileUid || currentUser.uid;
        let customization = JSON.parse(localStorage.getItem(`custom_${uid}`) || '{}');
        const snap = await db.collection('users').doc(uid).get(); const data = snap.data() || {};
        customization = data.customization || customization;
        const role = data.role; const badge = role === 'admin' ? '👑 Админ' : (role === 'moderator' ? '🛡️ Модер' : '');
        const frameClass = getFrameClass(role, data.achievements, customization.avatarFrame === 'gold' ? 'frame-gold' : customization.avatarFrame === 'diamond' ? 'frame-diamond' : null);
        const isOnline = onlineUsers.has(uid);
        const bgStyle = customization.profileBg ? `background-image:url('${customization.profileBg}')` : '';
        const miniBgStyle = customization.profileMiniBg ? `background-image:url('${customization.profileMiniBg}')` : '';
        pageContent.innerHTML = `<div class="profile-steam" style="${bgStyle}"><div class="profile-steam-content">
            <div style="display:flex;gap:20px;align-items:center;padding:15px;border-radius:16px;${miniBgStyle ? `background: url('${customization.profileMiniBg}') center/cover;` : ''}">
                <div class="avatar-frame ${frameClass}"><img src="${getUserAvatar(data)}" style="width:80px;height:80px;border-radius:50%"></div>
                <div>
                    <h2 id="profileNick" style="display:inline-block">${escapeHtml(data.displayName || currentUser.email)}</h2> ${badge} ${isOnline ? '<span class="online-dot"></span>' : ''}
                    ${uid === currentUser.uid ? '<button class="submit-btn" style="width:auto;padding:5px 15px;margin-left:10px" id="openCustomizeBtn">⚙️ Кастомизация</button>' : ''}
                    <p>${data.email}</p>
                </div>
            </div>
            <div style="margin-top:20px"><h3>Достижения</h3><div id="achievementsList"></div></div>
            <h3 style="margin-top:20px">Темы пользователя</h3><div id="userTopics"></div>
            <h3>Последние комментарии</h3><div id="userComments"></div>
        </div></div>`;
        if (uid === currentUser.uid) document.getElementById('openCustomizeBtn').onclick = openCustomizeModal;
        applyNickStyle(document.getElementById('profileNick'), customization);
        loadAchievements(uid, data.achievements || []);
        loadUserTopics(uid); loadUserComments(uid);
    } else if (page === 'moderation') {
        if (!isModerator) { pageContent.innerHTML = '<p>Доступ запрещён</p>'; return; }
        pageContent.innerHTML = `<h2>🛡️ Модерация</h2>
            <div style="display:flex;gap:20px;margin-bottom:20px"><button class="submit-btn" id="modPostsTab" style="width:auto">📝 Посты</button><button class="submit-btn" id="modCommentsTab" style="width:auto;background:rgba(106,78,255,0.2)">💬 Комментарии</button></div>
            <button class="submit-btn" id="openReportsBtn" style="width:auto;margin-bottom:20px">⚠️ Жалобы</button>
            <div id="modContent"></div>`;
        document.getElementById('modPostsTab').onclick = () => loadModTopics();
        document.getElementById('modCommentsTab').onclick = () => loadModComments();
        document.getElementById('openReportsBtn').onclick = () => { document.getElementById('reportsModal').classList.add('active'); loadReports(); };
        loadModTopics();
    } else if (page === 'users') {
        if (!isAdmin) { pageContent.innerHTML = '<p>Только админ</p>'; return; }
        pageContent.innerHTML = `<h2>👥 Пользователи</h2><div class="input-group"><input type="email" id="adminSearchEmail" placeholder="Email"></div><button class="submit-btn" id="adminSearchUserBtn">Найти</button><div id="adminSearchResult"></div>`;
        document.getElementById('adminSearchUserBtn').onclick = async () => {
            const email = document.getElementById('adminSearchEmail').value;
            const q = db.collection('users').where('email', '==', email); const snap = await q.get();
            if (snap.empty) { document.getElementById('adminSearchResult').innerHTML = '<p>Не найден</p>'; return; }
            const doc = snap.docs[0]; const data = doc.data(); const uid = doc.id; const role = data.role || 'user';
            document.getElementById('adminSearchResult').innerHTML = `<p><strong>${data.displayName}</strong> (${email})</p><p>Роль: ${role}</p><button class="submit-btn" onclick="window.setUserRole('${uid}','moderator')">Сделать модером</button> <button class="submit-btn" onclick="window.setUserRole('${uid}','user')">Снять модера</button>`;
        };
    }
}
