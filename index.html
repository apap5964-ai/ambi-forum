<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBI FORUM — Сообщество</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: #fff; display: flex; min-height: 100vh; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .sidebar { width: 280px; background: rgba(12,12,20,0.8); backdrop-filter: blur(10px); padding: 25px 15px; border-right: 1px solid rgba(106,78,255,0.2); display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; }
        .logo { font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, #6a4eff, #a855f7, #ec4899); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 30px; text-align: center; }
        .nav-item { padding: 12px 18px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
        .nav-item i { font-size: 1.4rem; width: 24px; }
        .nav-item:hover, .nav-item.active { background: rgba(106,78,255,0.15); color: white; border-left: 3px solid #6a4eff; }
        .nav-section { margin-top: 20px; }
        .nav-section-title { font-size: 0.8rem; text-transform: uppercase; opacity: 0.5; margin-bottom: 10px; padding-left: 18px; }

        .main-content { margin-left: 280px; flex: 1; padding: 25px 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 2rem; font-weight: 700; }
        
        .profile-dropdown { position: relative; }
        .profile-btn { display: flex; align-items: center; gap: 12px; background: rgba(20,20,35,0.8); backdrop-filter: blur(5px); border: 1px solid rgba(106,78,255,0.3); padding: 8px 16px; border-radius: 40px; cursor: pointer; transition: 0.2s; }
        .profile-btn:hover { border-color: #6a4eff; box-shadow: 0 0 15px rgba(106,78,255,0.3); }
        .profile-btn img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #6a4eff; }
        .profile-btn span { font-weight: 600; }
        .dropdown-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 260px; background: rgba(10,10,20,0.95); backdrop-filter: blur(15px); border-radius: 20px; padding: 15px; border: 1px solid rgba(106,78,255,0.3); display: none; opacity: 0; transform: scale(0.9) translateY(-10px); transition: all 0.2s; z-index: 100; }
        .dropdown-panel.active { display: block; opacity: 1; transform: scale(1) translateY(0); }
        .dropdown-panel .menu-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .dropdown-panel .menu-item:hover { background: rgba(106,78,255,0.2); }
        .dropdown-panel hr { margin: 10px 0; border-color: rgba(106,78,255,0.2); }

        .forum-grid { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        .topics-area { background: rgba(20,20,40,0.5); backdrop-filter: blur(5px); border-radius: 24px; padding: 20px; border: 1px solid rgba(106,78,255,0.2); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .topic-card { background: rgba(10,10,20,0.6); border-radius: 16px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(106,78,255,0.2); transition: 0.2s; cursor: pointer; }
        .topic-card:hover { border-color: #6a4eff; transform: translateY(-2px); }
        .topic-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 5px; color: #a855f7; }
        .topic-meta { display: flex; gap: 20px; font-size: 0.8rem; opacity: 0.7; margin-bottom: 8px; }
        .topic-author { display: flex; align-items: center; gap: 8px; }
        .topic-author img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #6a4eff; }

        .right-sidebar { background: rgba(20,20,40,0.3); backdrop-filter: blur(5px); border-radius: 20px; padding: 20px; border: 1px solid rgba(106,78,255,0.2); height: fit-content; }
        .right-sidebar h3 { margin-bottom: 15px; color: #a855f7; }
        .recent-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(106,78,255,0.1); }
        .recent-item:last-child { border: none; }
        .recent-item img { width: 24px; height: 24px; border-radius: 50%; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-card { background: rgba(20,20,40,0.9); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .close-btn { font-size: 24px; cursor: pointer; }

        .input-group { margin-bottom: 20px; }
        .input-group input, .input-group textarea { width: 100%; padding: 14px; background: rgba(10,10,20,0.6); border: 1px solid rgba(106,78,255,0.3); border-radius: 16px; color: white; outline: none; }
        .input-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
        .submit-btn { background: linear-gradient(135deg, #6a4eff, #a855f7); padding: 14px; border: none; border-radius: 30px; color: white; font-weight: 700; width: 100%; cursor: pointer; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-right: 8px; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #6a4eff, #a855f7); padding: 10px 20px; border-radius: 50px; z-index: 9999; animation: toastFade 2s ease-out; }
        @keyframes toastFade { 0%{opacity:0;transform:translateX(-50%) translateY(20px);}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-20px);} }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">💬 AMBI</div>
    <div class="nav-item active" data-page="home"><i>🏠</i> Главная</div>
    <div class="nav-item" data-page="profile"><i>👤</i> Профиль</div>
    <div class="nav-item" data-page="settings"><i>⚙️</i> Настройки</div>
    <div class="nav-section">
        <div class="nav-section-title">Сообщество</div>
        <div class="nav-item" data-page="new"><i>➕</i> Новая тема</div>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <div class="page-title" id="pageTitle">Главная</div>
        <div class="profile-dropdown">
            <div class="profile-btn" id="profileBtn">
                <img id="profileAvatar" src="https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff">
                <span id="profileName">Гость</span>
                <span>▼</span>
            </div>
            <div class="dropdown-panel" id="profileDropdown">
                <div id="guestDropdown" style="display: none;">
                    <div class="menu-item" id="menuLogin">🔑 Войти</div>
                    <div class="menu-item" id="menuRegister">📝 Регистрация</div>
                </div>
                <div id="userDropdown" style="display: none;">
                    <div class="profile-mini" style="display: flex; align-items: center; gap: 12px; padding: 10px;">
                        <img id="dropdownAvatar" src="https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #6a4eff;">
                        <div><strong id="dropdownName"></strong><br><span id="dropdownEmail" style="opacity:0.7; font-size:0.9rem;"></span></div>
                    </div>
                    <hr>
                    <div class="menu-item" id="menuProfile">👤 Профиль</div>
                    <div class="menu-item" id="menuSettings">⚙️ Настройки</div>
                    <div class="menu-item" id="menuChangeAvatar">📷 Сменить аватар</div>
                    <hr>
                    <div class="menu-item" id="menuLogout">🚪 Выйти</div>
                </div>
            </div>
        </div>
    </div>

    <div id="pageContent"><!-- динамически --></div>
</div>

<!-- Модалка входа/регистрации -->
<div class="modal" id="authModal">
    <div class="modal-card" style="max-width: 400px;">
        <div class="modal-header"><h3 id="authTitle">Вход</h3><span class="close-btn" id="closeAuthModal">&times;</span></div>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="submit-btn" id="loginTabBtn" style="flex:1;">LOGIN</button>
            <button class="submit-btn" id="registerTabBtn" style="flex:1; background: rgba(106,78,255,0.2);">REGISTER</button>
        </div>
        <form id="loginForm">
            <div class="input-group"><input type="email" id="loginEmail" placeholder="Email" required></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль" required></div>
            <button type="submit" class="submit-btn">Войти</button>
        </form>
        <form id="registerForm" style="display: none;">
            <div class="input-group"><input type="text" id="regUsername" placeholder="Имя" required></div>
            <div class="input-group"><input type="email" id="regEmail" placeholder="Email" required></div>
            <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль" required></div>
            <div class="input-group"><input type="password" id="regConfirm" placeholder="Подтверждение" required></div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
    </div>
</div>

<!-- Модалка создания темы -->
<div class="modal" id="newTopicModal">
    <div class="modal-card">
        <div class="modal-header"><h3>📝 Новая тема</h3><span class="close-btn" id="closeNewTopicModal">&times;</span></div>
        <div class="input-group"><input type="text" id="topicTitle" placeholder="Заголовок"></div>
        <div class="input-group"><textarea id="topicContent" placeholder="Текст" style="height:150px;"></textarea></div>
        <div class="file-upload-area" id="topicFileUpload" style="border:2px dashed rgba(106,78,255,0.3); border-radius:16px; padding:15px; text-align:center; margin-bottom:20px; cursor:pointer;">📎 Прикрепить картинку</div>
        <input type="file" id="topicFileInput" accept="image/*" style="display:none;">
        <img id="topicImagePreview" style="max-width:100%; max-height:200px; border-radius:12px; margin-bottom:15px; display:none;">
        <button class="submit-btn" id="createTopicBtn">Опубликовать</button>
    </div>
</div>

<!-- Модалка просмотра темы -->
<div class="modal" id="viewTopicModal">
    <div class="modal-card" style="max-width:700px;">
        <div class="modal-header"><h3 id="viewTopicTitle"></h3><span class="close-btn" id="closeViewTopicModal">&times;</span></div>
        <div id="viewTopicContent"></div>
        <div id="commentsSection" style="margin:20px 0;"></div>
        <div class="input-group"><textarea id="commentInput" placeholder="Комментарий..."></textarea></div>
        <button class="submit-btn" id="addCommentBtn">Отправить</button>
    </div>
</div>

<!-- Модалка настроек -->
<div class="modal" id="settingsModal">
    <div class="modal-card">
        <div class="modal-header"><h3>⚙️ Настройки приватности</h3><span class="close-btn" id="closeSettingsModal">&times;</span></div>
        <div class="checkbox-group"><label><input type="checkbox" id="showOnline"> Показывать мой онлайн статус</label></div>
        <div class="checkbox-group"><label><input type="checkbox" id="receiveEmails"> Получать новости на email</label></div>
        <button class="submit-btn" id="saveSettingsBtn">Сохранить</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDCaTAB8wBL-VyFXwo5UlBUwwb51LRb2a4",
        authDomain: "ambi-loader-site.firebaseapp.com",
        projectId: "ambi-loader-site",
        storageBucket: "ambi-loader-site.firebasestorage.app",
        messagingSenderId: "751272275051",
        appId: "1:751272275051:web:6f9976c1bc05f606a0d52e"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const CLOUD_NAME = "doptuvy8l";
    const UPLOAD_PRESET = "forum_preset";

    let currentUser = null;
    let currentPostId = null;
    let currentPage = 'home';
    let userSettings = { showOnline: true, receiveEmails: false };

    // UI
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');
    const guestDropdown = document.getElementById('guestDropdown');
    const userDropdown = document.getElementById('userDropdown');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileName = document.getElementById('profileName');
    const dropdownAvatar = document.getElementById('dropdownAvatar');
    const dropdownName = document.getElementById('dropdownName');
    const dropdownEmail = document.getElementById('dropdownEmail');
    const pageTitle = document.getElementById('pageTitle');
    const pageContent = document.getElementById('pageContent');
    const authModal = document.getElementById('authModal');
    const closeAuthModal = document.getElementById('closeAuthModal');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginTabBtn = document.getElementById('loginTabBtn');
    const registerTabBtn = document.getElementById('registerTabBtn');

    // Навигация
    document.querySelectorAll('[data-page]').forEach(el => {
        el.addEventListener('click', () => {
            const page = el.dataset.page;
            if (page === 'new') {
                if (!currentUser) { alert('Войдите'); return; }
                document.getElementById('newTopicModal').classList.add('active');
                return;
            }
            currentPage = page;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            renderPage(page);
        });
    });

    profileBtn.onclick = (e) => { e.stopPropagation(); profileDropdown.classList.toggle('active'); };
    document.addEventListener('click', (e) => { if (!profileBtn.contains(e.target)) profileDropdown.classList.remove('active'); });

    // Меню профиля
    document.getElementById('menuProfile').onclick = () => { currentPage = 'profile'; renderPage('profile'); profileDropdown.classList.remove('active'); };
    document.getElementById('menuSettings').onclick = () => { document.getElementById('settingsModal').classList.add('active'); profileDropdown.classList.remove('active'); };
    document.getElementById('menuLogout').onclick = async () => { await auth.signOut(); profileDropdown.classList.remove('active'); };

    // Авторизация
    auth.onAuthStateChanged(async user => {
        currentUser = user;
        if (user) {
            const name = user.displayName || user.email.split('@')[0];
            profileName.textContent = name;
            dropdownName.textContent = name;
            dropdownEmail.textContent = user.email;
            guestDropdown.style.display = 'none';
            userDropdown.style.display = 'block';
            await loadUserData(user.uid);
        } else {
            profileName.textContent = 'Гость';
            profileAvatar.src = 'https://ui-avatars.com/api/?name=Guest&background=6a4eff&color=fff';
            dropdownAvatar.src = 'https://ui-avatars.com/api/?name=User&background=6a4eff&color=fff';
            guestDropdown.style.display = 'block';
            userDropdown.style.display = 'none';
        }
        renderPage(currentPage);
    });

    async function loadUserData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            const data = doc.data();
            if (data.avatarBase64) {
                profileAvatar.src = data.avatarBase64;
                dropdownAvatar.src = data.avatarBase64;
            } else {
                profileAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(profileName.textContent)}&background=6a4eff&color=fff`;
                dropdownAvatar.src = profileAvatar.src;
            }
            if (data.settings) userSettings = data.settings;
        }
    }

    // Модалки входа
    document.getElementById('menuLogin').onclick = () => { authModal.classList.add('active'); profileDropdown.classList.remove('active'); };
    document.getElementById('menuRegister').onclick = () => { authModal.classList.add('active'); registerTabBtn.click(); profileDropdown.classList.remove('active'); };
    closeAuthModal.onclick = () => authModal.classList.remove('active');
    loginTabBtn.onclick = () => { loginForm.style.display='block'; registerForm.style.display='none'; loginTabBtn.style.background='linear-gradient(135deg, #6a4eff, #a855f7)'; registerTabBtn.style.background='rgba(106,78,255,0.2)'; };
    registerTabBtn.onclick = () => { loginForm.style.display='none'; registerForm.style.display='block'; registerTabBtn.style.background='linear-gradient(135deg, #6a4eff, #a855f7)'; loginTabBtn.style.background='rgba(106,78,255,0.2)'; };
    loginForm.onsubmit = async (e) => { e.preventDefault(); try { await auth.signInWithEmailAndPassword(loginEmail.value, loginPassword.value); authModal.classList.remove('active'); } catch(err) { alert(err.message); } };
    registerForm.onsubmit = async (e) => { e.preventDefault(); if (regPassword.value !== regConfirm.value) { alert('Пароли не совпадают'); return; } try { const cred = await auth.createUserWithEmailAndPassword(regEmail.value, regPassword.value); await cred.user.updateProfile({ displayName: regUsername.value }); await db.collection('users').doc(cred.user.uid).set({ displayName: regUsername.value, email: regEmail.value, avatarBase64: '', settings: { showOnline: true, receiveEmails: false } }, { merge: true }); authModal.classList.remove('active'); } catch(err) { alert(err.message); } };

    // Смена аватарки
    const hiddenAvatarInput = document.createElement('input');
    hiddenAvatarInput.type = 'file'; hiddenAvatarInput.accept = 'image/*';
    hiddenAvatarInput.onchange = async (e) => {
        const file = e.target.files[0]; if (!file || !currentUser) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const base64 = ev.target.result;
            await db.collection('users').doc(currentUser.uid).set({ avatarBase64: base64 }, { merge: true });
            profileAvatar.src = base64; dropdownAvatar.src = base64;
            showToast('Аватар обновлён!');
        };
        reader.readAsDataURL(file);
    };
    document.getElementById('menuChangeAvatar').onclick = () => hiddenAvatarInput.click();

    // Рендер страниц
    async function renderPage(page) {
        pageTitle.textContent = page === 'home' ? 'Главная' : page === 'profile' ? 'Профиль' : 'Настройки';
        if (page === 'home') {
            pageContent.innerHTML = `
                <div class="forum-grid">
                    <div class="topics-area">
                        <div class="section-header"><h2>🔥 Последние темы</h2><button class="submit-btn" style="width:auto; padding:10px 20px;" id="createTopicInline">+ Новая тема</button></div>
                        <div id="topicsList"></div>
                    </div>
                    <div class="right-sidebar">
                        <h3>💬 Последние ответы</h3>
                        <div id="recentComments"></div>
                    </div>
                </div>
            `;
            document.getElementById('createTopicInline').onclick = () => { if (!currentUser) { alert('Войдите'); return; } document.getElementById('newTopicModal').classList.add('active'); };
            loadTopics();
            loadRecentComments();
        } else if (page === 'profile') {
            if (!currentUser) { pageContent.innerHTML = '<p>Войдите для просмотра</p>'; return; }
            const doc = await db.collection('users').doc(currentUser.uid).get();
            const data = doc.data() || {};
            pageContent.innerHTML = `
                <div style="background:rgba(20,20,40,0.5); border-radius:24px; padding:30px;">
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
                        <img src="${data.avatarBase64 || 'https://ui-avatars.com/api/?name='+encodeURIComponent(currentUser.displayName||currentUser.email)}" style="width:80px; height:80px; border-radius:50%; border:3px solid #6a4eff;">
                        <div><h2>${currentUser.displayName || currentUser.email}</h2><p>${currentUser.email}</p></div>
                    </div>
                    <h3>Ваши темы</h3>
                    <div id="userTopics"></div>
                </div>
            `;
            loadUserTopics();
        }
    }

    async function loadTopics() {
        const container = document.getElementById('topicsList');
        try {
            const snap = await db.collection('forum_posts').orderBy('createdAt','desc').limit(20).get();
            let html = '';
            snap.forEach(doc => {
                const p = doc.data();
                html += `<div class="topic-card" onclick="openTopic('${doc.id}')">
                    <div class="topic-title">${escapeHtml(p.title)}</div>
                    <div class="topic-meta"><span>📅 ${p.createdAt?.toDate().toLocaleString()||''}</span><span>💬 ${p.commentCount||0}</span></div>
                    <div class="topic-author"><img src="${p.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(p.authorName)}"> ${escapeHtml(p.authorName)}</div>
                </div>`;
            });
            container.innerHTML = html || '<p>Нет тем</p>';
        } catch(e) { console.error(e); }
    }

    async function loadRecentComments() {
        // Заглушка: последние комментарии
        document.getElementById('recentComments').innerHTML = '<p>Загрузка...</p>';
        // Реализуй по желанию
    }

    async function loadUserTopics() {
        const container = document.getElementById('userTopics');
        const snap = await db.collection('forum_posts').where('authorId','==',currentUser.uid).orderBy('createdAt','desc').get();
        let html = '';
        snap.forEach(doc => { const p = doc.data(); html += `<div class="topic-card" onclick="openTopic('${doc.id}')"><div class="topic-title">${p.title}</div><div class="topic-meta">${p.createdAt?.toDate().toLocaleString()}</div></div>`; });
        container.innerHTML = html || '<p>У вас нет тем</p>';
    }

    window.openTopic = async (postId) => {
        currentPostId = postId;
        const doc = await db.collection('forum_posts').doc(postId).get();
        const post = doc.data();
        document.getElementById('viewTopicTitle').textContent = post.title;
        let html = `<div style="display:flex; gap:15px; margin-bottom:20px;"><img src="${post.authorAvatar||'https://ui-avatars.com/api/?name='+encodeURIComponent(post.authorName)}" style="width:40px; height:40px; border-radius:50%;"> <div><strong>${post.authorName}</strong><br>${post.createdAt?.toDate().toLocaleString()}</div></div>`;
        html += `<div>${escapeHtml(post.content)}</div>`;
        if (post.imageUrl) html += `<img src="${post.imageUrl}" style="max-width:100%; border-radius:16px; margin-top:15px;">`;
        document.getElementById('viewTopicContent').innerHTML = html;
        const commentsSnap = await db.collection('forum_posts').doc(postId).collection('comments').orderBy('createdAt').get();
        let commHtml = '';
        commentsSnap.forEach(c => { commHtml += `<div style="background:rgba(30,30,50,0.5); padding:10px; border-radius:12px; margin-bottom:10px;"><strong>${c.data().authorName}</strong>: ${c.data().text}</div>`; });
        document.getElementById('commentsSection').innerHTML = commHtml;
        document.getElementById('viewTopicModal').classList.add('active');
    };

    document.getElementById('closeViewTopicModal').onclick = () => document.getElementById('viewTopicModal').classList.remove('active');
    document.getElementById('addCommentBtn').onclick = async () => {
        if (!currentUser) return alert('Войдите');
        const text = document.getElementById('commentInput').value.trim();
        if (!text) return;
        await db.collection('forum_posts').doc(currentPostId).collection('comments').add({
            text, authorId: currentUser.uid, authorName: currentUser.displayName || currentUser.email, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('forum_posts').doc(currentPostId).update({ commentCount: firebase.firestore.FieldValue.increment(1) });
        document.getElementById('commentInput').value = '';
        openTopic(currentPostId);
    };

    // Создание темы
    let topicImageUrl = '';
    document.getElementById('topicFileUpload').onclick = () => document.getElementById('topicFileInput').click();
    document.getElementById('topicFileInput').onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method:'POST', body:fd });
        const data = await res.json(); topicImageUrl = data.secure_url;
        document.getElementById('topicImagePreview').src = topicImageUrl;
        document.getElementById('topicImagePreview').style.display = 'block';
    };
    document.getElementById('createTopicBtn').onclick = async () => {
        if (!currentUser) return alert('Войдите');
        const title = document.getElementById('topicTitle').value.trim();
        const content = document.getElementById('topicContent').value.trim();
        if (!title || !content) return alert('Заполните');
        const name = currentUser.displayName || currentUser.email;
        const userDoc = await db.collection('users').doc(currentUser.uid).get();
        const avatar = userDoc.data()?.avatarBase64 || '';
        await db.collection('forum_posts').add({
            title, content, imageUrl: topicImageUrl, authorId: currentUser.uid, authorName: name, authorAvatar: avatar,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(), commentCount: 0
        });
        document.getElementById('newTopicModal').classList.remove('active');
        topicImageUrl = ''; document.getElementById('topicImagePreview').style.display='none';
        document.getElementById('topicTitle').value = document.getElementById('topicContent').value = '';
        if (currentPage === 'home') loadTopics();
        showToast('Тема создана!');
    };

    // Настройки
    document.getElementById('saveSettingsBtn').onclick = async () => {
        if (!currentUser) return;
        const settings = {
            showOnline: document.getElementById('showOnline').checked,
            receiveEmails: document.getElementById('receiveEmails').checked
        };
        await db.collection('users').doc(currentUser.uid).set({ settings }, { merge: true });
        showToast('Настройки сохранены');
        document.getElementById('settingsModal').classList.remove('active');
    };

    function showToast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

    // Инициализация
    document.getElementById('closeNewTopicModal').onclick = () => document.getElementById('newTopicModal').classList.remove('active');
    document.getElementById('closeSettingsModal').onclick = () => document.getElementById('settingsModal').classList.remove('active');
    renderPage('home');
</script>
</body>
</html>
